// ---- CORP CHAT (live pulse-poll) ----
const CHAT={open:false,lastId:0,timer:null,corpName:''};
function openChat(){
    const p=document.getElementById('chat-panel');if(!p)return;
    CHAT.open=true;CHAT.lastId=0;p.style.display='block';
    document.getElementById('chat-log').innerHTML='<div style="color:#555">connecting...</div>';
    pollChat();
    if(CHAT.timer)clearInterval(CHAT.timer);
    CHAT.timer=setInterval(pollChat,2500);
}
function closeChat(){CHAT.open=false;const p=document.getElementById('chat-panel');if(p)p.style.display='none';if(CHAT.timer){clearInterval(CHAT.timer);CHAT.timer=null;}}
async function pollChat(){
    if(!CHAT.open)return;
    try{
        const r=await fetch(API+'/api/chat?uid='+_uid()+'&since='+CHAT.lastId);
        const d=await r.json();
        CHAT.corpName=d.corp_name;
        document.getElementById('chat-title').textContent='💬 '+d.corp_name+' CHAT';
        const log=document.getElementById('chat-log');
        if(CHAT.lastId===0)log.innerHTML='';
        if(d.messages&&d.messages.length){
            for(const m of d.messages){
                const div=document.createElement('div');
                const mine=(String(m.uid)===String(_uid()));
                div.innerHTML='<span style="color:'+(mine?'#FFC800':'#00FF8C')+'">'+m.name+'</span>'+
                    ' <span style="color:#ccc">'+m.text.replace(/</g,'&lt;')+'</span>';
                log.appendChild(div);
            }
            CHAT.lastId=d.last_id;
            log.scrollTop=log.scrollHeight;
        }else if(CHAT.lastId===0){log.innerHTML='<div style="color:#555">no messages yet — say hi!</div>';}
    }catch(e){}
}
async function sendChat(){
    const el=document.getElementById('chat-in');const text=el?el.value.trim():'';

    try{
        await fetch(API+'/pulse/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({uid:_uid(),text:text})});

    }catch(e){}

        s+='Pending: '+d.pending+'\nCost: '+d.cost+'g\n';
        const action=prompt(s+'1=Predict, 2=Settle, 3=Leaderboard','1');
        if(!action)return;
        if(action==='1'){
            const stock=prompt('Stock (ALPHA/DELTA/OMEGA/...):','ALPHA');
            const dir=prompt('Direction: up or down?','up');
            if(!stock||!dir)return;
            const r2=await fetch(API+'/pulse/predict/make',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({uid:uid,stock:stock,direction:dir})});const d2=await r2.json();
            if(d2.error){showOverlay('PREDICT',d2.error);}else{SND.promo();showOverlay('PREDICTED',d2.stock+' '+d2.direction.toUpperCase()+' @ '+d2.price);loadPlayer(uid);}
        }else if(action==='2'){
            const r2=await fetch(API+'/pulse/predict/settle',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({uid:uid})});const d2=await r2.json();
            if(d2.results.length){
                let msg='SETTLED:\n';
                d2.results.forEach(r=>{msg+=r.stock+' '+r.direction+': '+(r.won?'★ WIN +'+r.prize+'g':'✕ LOSS')+'\n';});
                if(d2.results.some(r=>r.won))SND.promo();
                showOverlay('PREDICT',msg);loadPlayer(uid);
            }else{showOverlay('PREDICT','No predictions to settle yet (>1h needed)');}
        }else{
            const r2=await fetch(API+'/api/predict/lb');const lb=await r2.json();
            let msg='🏆 PREDICTION LEADERBOARD\n\n';
            lb.forEach((e,i)=>{msg+=(i+1)+'. UID '+e.uid+' — '+e.accuracy+'% ('+e.wins+'/'+e.total+')\n';});
            if(!lb.length)msg+='No data yet';
            showOverlay('LEADERBOARD',msg);
        }
    }catch(e){showOverlay('PREDICT','offline');}
};

// ====== TREASURE HUNT ======
document.getElementById('btn-treasure').onclick=async()=>{
    try{
        const uid=S.uid;if(!uid){showOverlay('TREASURE','select player first');return;}
        const r=await fetch(API+'/api/treasure/'+uid);const d=await r.json();
        let s='🗺 TREASURE HUNT\n\n';
        s+='Free searches today: '+d.remaining+'\n';
        s+='Search cost: '+d.cost+'g (if no free)';
        const action=prompt(s+'\n\n1=Search, 0=Cancel','1');
        if(!action||action==='0')return;
        const r2=await fetch(API+'/pulse/treasure/search',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({uid:uid})});const d2=await r2.json();
        if(d2.error){showOverlay('TREASURE',d2.error);return;}
        if(d2.type==='riddle'){
            const ans=prompt('🧩 '+d2.question+'\nAnswer:','');
            if(ans){
                const r3=await fetch(API+'/pulse/treasure/solve',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({uid:uid,riddle_id:d2.riddle_id,answer:parseInt(ans)})});const d3=await r3.json();
                if(d3.correct){SND.promo();showOverlay('CORRECT','★ +'+d3.prize+'g');}else{showOverlay('WRONG','Answer was: '+d3.answer);}
                loadPlayer(uid);
            }
        }else if(d2.type==='gold'){SND.promo();showOverlay('FOUND','+'+d2.amount+'g!');loadPlayer(uid);}
        else if(d2.type==='loot'){SND.promo();showOverlay('FOUND',d2.item.name+' ['+d2.item.rarity+'] value:'+d2.item.value+'g');loadPlayer(uid);}
        else{showOverlay('SEARCH',d2.message);}
    }catch(e){showOverlay('TREASURE','offline');}
};

// ====== HERO TRAINING ======
document.getElementById('btn-training').onclick=async()=>{
    try{
        const uid=S.uid;if(!uid){showOverlay('TRAIN','select player first');return;}
        const r=await fetch(API+'/api/training/'+uid);const d=await r.json();
        let s='🏋 HERO TRAINING\n\n';
        s+='Slots: '+d.slots_used+'/'+d.max_slots+'\n';
        if(d.active.length){
            s+='Active missions:\n';
            d.active.forEach((m,i)=>{s+='  '+(i+1)+'. '+m.name+' ('+Math.floor(m.remaining/60)+'min left)\n';});
        }
        if(d.ready.length){
            s+='Ready to collect:\n';
            d.ready.forEach((m,i)=>{s+='  ★ '+m.name+'\n';});
            if(confirm(s+'\nCollect ready missions?')){
                for(let i=0;i<d.ready.length;i++){
                    await fetch(API+'/pulse/training/collect',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({uid:uid,mission_idx:i})});
                }
                SND.promo();showOverlay('TRAINING','Missions collected!');loadPlayer(uid);
                return;
            }
        }
        s+='\nAvailable missions:\n';
        d.available_missions.forEach((m,i)=>{s+=(i+1)+'. '+m.name+' ('+Math.floor(m.duration/60)+'min, '+m.xp+'xp)\n';});
        const choice=prompt(s+'\nStart mission #: (0=cancel)','0');
        if(!choice||choice==='0')return;
        const m=d.available_missions[parseInt(choice)-1];
        const r2=await fetch(API+'/pulse/training/start',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({uid:uid,mission_id:m.id})});const d2=await r2.json();
        if(d2.error){showOverlay('TRAIN',d2.error);}else{showOverlay('TRAINING',d2.mission+' started! Returns in '+Math.floor(d2.duration/60)+'min');}
    }catch(e){showOverlay('TRAIN','offline');}
};

// ====== AUCTION HOUSE ======
document.getElementById('btn-auction').onclick=async()=>{
    try{
        const uid=S.uid;if(!uid){showOverlay('AUCTION','select player first');return;}
        const action=prompt('🏷 AUCTION\n\n1=Browse, 2=Sell, 3=Bid','1');
        if(!action)return;
        if(action==='1'){
            const r=await fetch(API+'/api/auction');const auctions=await r.json();
            let s='AUCTION HOUSE\n\n';
            auctions.slice(0,10).forEach((a,i)=>{
                s+=(i+1)+'. '+a.item.name+' ['+a.item.rarity+'] — '+a.current_bid+'g ('+a.bids+' bids, '+Math.floor(a.ends_in/60)+'min left)\n';
            });
            if(!auctions.length)s+='Empty!';
            const bid=prompt(s+'\nBid on # (0=cancel):','0');
            if(bid&&bid!=='0'){
                const a=auctions[parseInt(bid)-1];
                const amt=prompt('Your bid (current: '+a.current_bid+'g):',a.current_bid+100);
                if(!amt)return;
                const r2=await fetch(API+'/pulse/auction/bid',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({uid:uid,auction_id:a.id,amount:parseInt(amt)})});const d2=await r2.json();
                if(d2.error){showOverlay('BID',d2.error);}else{SND.promo();showOverlay('BID PLACED','Bid: '+d2.bid+'g');loadPlayer(uid);}
            }
        }else if(action==='2'){
            const r=await fetch(API+'/api/char/'+uid);const ch=await r.json();
            let s='Your loot:\n';
            (ch.loot||[]).slice(0,10).forEach((l,i)=>{s+=(i+1)+'. '+l.name+' ('+l.value+'g)\n';});
            const idx=prompt(s+'\nSell item #:','1');if(!idx)return;
            const price=prompt('Start price:','500');if(!price)return;
            const dur=prompt('Duration (1800/3600/7200 sec):','3600');if(!dur)return;
            const r2=await fetch(API+'/pulse/auction/create',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({uid:uid,item_idx:parseInt(idx)-1,price:parseInt(price),duration:parseInt(dur)})});const d2=await r2.json();
            if(d2.error){showOverlay('AUCTION',d2.error);}else{showOverlay('LISTED','Item on auction for '+Math.floor(d2.ends_in/60)+'min');loadPlayer(uid);}
        }else{
            const r=await fetch(API+'/api/auction');const auctions=await r.json();
            let s='Your active auctions:\n';
            const mine=auctions.filter(a=>a.seller===uid);
            mine.forEach((a,i)=>{s+=(i+1)+'. '+a.item.name+' — '+a.current_bid+'g ('+a.bids+' bids)\n';});
            if(!mine.length)s+='None';
            showOverlay('AUCTIONS',s);
        }
    }catch(e){showOverlay('AUCTION','offline');}
};
