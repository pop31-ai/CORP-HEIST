<script>
// ============================================================
// COMPACT QR ENCODER (byte mode, EC-L, versions 1..4, mask 0)
// self-contained, no external libraries
// ============================================================
const QR=(function(){
  const GEXP=new Array(256),GLOG=new Array(256);
  (function(){let x=1;for(let i=0;i<255;i++){GEXP[i]=x;GLOG[x]=i;x<<=1;if(x&0x100)x^=0x11d;}GEXP[255]=GEXP[0];})();
  function gmul(a,b){if(a===0||b===0)return 0;return GEXP[(GLOG[a]+GLOG[b])%255];}
  function rsPoly(n){let p=[1];for(let i=0;i<n;i++){const np=new Array(p.length+1).fill(0);
    for(let j=0;j<p.length;j++){np[j]^=gmul(p[j],1);np[j+1]^=gmul(p[j],GEXP[i]);}p=np;}return p;}
  function rsEncode(data,ecLen){const gen=rsPoly(ecLen);const res=data.concat(new Array(ecLen).fill(0));
    for(let i=0;i<data.length;i++){const c=res[i];if(c!==0)for(let j=0;j<gen.length;j++)res[i+j]^=gmul(gen[j],c);}
    return res.slice(data.length);}
  // version params for EC-L: [version, totalCodewords, ecPerBlock] (single block, v1..4)
  const V=[null,
    {size:21,total:26,ec:7,cap:17},
    {size:25,total:44,ec:10,cap:32},
    {size:29,total:70,ec:15,cap:53},
    {size:33,total:100,ec:20,cap:78}];
  function pick(len){for(let v=1;v<=4;v++)if(len<=V[v].cap)return v;return 4;}
  function encode(text){
    const bytes=[];for(let i=0;i<text.length;i++){const c=text.charCodeAt(i);
      if(c<128)bytes.push(c);else if(c<2048){bytes.push(192|(c>>6));bytes.push(128|(c&63));}
      else{bytes.push(224|(c>>12));bytes.push(128|((c>>6)&63));bytes.push(128|(c&63));}}
    const ver=pick(bytes.length);const p=V[ver];
    // bitstream: mode(0100)+len(8bit v1-4? actually 8 for v1-9 byte)+data
    let bits=[];const push=(val,n)=>{for(let i=n-1;i>=0;i--)bits.push((val>>i)&1);};
    push(4,4);push(bytes.length,8);for(const b of bytes)push(b,8);
    const dataCw=p.total-p.ec;const maxBits=dataCw*8;
    // terminator
    for(let i=0;i<4&&bits.length<maxBits;i++)bits.push(0);
    while(bits.length%8!==0)bits.push(0);
    const cw=[];for(let i=0;i<bits.length;i+=8){let b=0;for(let j=0;j<8;j++)b=(b<<1)|bits[i+j];cw.push(b);}
    const pads=[0xEC,0x11];let pi=0;while(cw.length<dataCw){cw.push(pads[pi++%2]);}
    const ec=rsEncode(cw,p.ec);const all=cw.concat(ec);
    // build matrix
    const sz=p.size;const m=[];const rez=[];
    for(let i=0;i<sz;i++){m.push(new Array(sz).fill(null));rez.push(new Array(sz).fill(false));}
    function finder(r,c){for(let dr=-1;dr<=7;dr++)for(let dc=-1;dc<=7;dc++){const rr=r+dr,cc=c+dc;
      if(rr<0||cc<0||rr>=sz||cc>=sz)continue;const b=(dr>=0&&dr<=6&&(dc===0||dc===6))||(dc>=0&&dc<=6&&(dr===0||dr===6))||(dr>=2&&dr<=4&&dc>=2&&dc<=4);
      m[rr][cc]=b?1:0;rez[rr][cc]=true;}}
    finder(0,0);finder(0,sz-7);finder(sz-7,0);
    // timing
    for(let i=8;i<sz-8;i++){if(m[6][i]===null){m[6][i]=(i%2===0)?1:0;rez[6][i]=true;}if(m[i][6]===null){m[i][6]=(i%2===0)?1:0;rez[i][6]=true;}}
    // alignment (v2-4 single at sz-7,sz-7 center)
    if(ver>=2){const ac=sz-7;for(let dr=-2;dr<=2;dr++)for(let dc=-2;dc<=2;dc++){const rr=ac+dr,cc=ac+dc;
      const b=(Math.abs(dr)===2||Math.abs(dc)===2||(dr===0&&dc===0));m[rr][cc]=b?1:0;rez[rr][cc]=true;}}
    // dark module
    m[sz-8][8]=1;rez[sz-8][8]=true;
    // reserve format areas
    for(let i=0;i<9;i++){if(!rez[8][i]){rez[8][i]=true;}if(!rez[i][8]){rez[i][8]=true;}}
    for(let i=0;i<8;i++){rez[8][sz-1-i]=true;rez[sz-1-i][8]=true;}
    // place data, mask 0 ((r+c)%2==0)
    let bit=0;const stream=[];for(const b of all)for(let i=7;i>=0;i--)stream.push((b>>i)&1);
    let dir=-1,col=sz-1;
    while(col>0){if(col===6)col--;
      for(let i=0;i<sz;i++){const row=dir<0?sz-1-i:i;
        for(let cc=0;cc<2;cc++){const c=col-cc;
          if(rez[row][c])continue;
          let v=bit<stream.length?stream[bit++]:0;
          if(((row+c)%2)===0)v^=1;
          m[row][c]=v;rez[row][c]=true;
        }}
      dir=-dir;col-=2;}
    // format info: EC-L(01) mask 0(000) -> data 01000 ; BCH
    function fmtBits(){const data=0b01000;let d=data<<10;const g=0b10100110111;
      let v=d;for(let i=14;i>=10;i--){if((v>>i)&1)v^=g<<(i-10);} let bits=(data<<10)|v; bits^=0b101010000010010; return bits;}
    const fb=fmtBits();
    // place format around top-left + split
    for(let i=0;i<=5;i++)m[8][i]=(fb>>i)&1;
    m[8][7]=(fb>>6)&1;m[8][8]=(fb>>7)&1;m[7][8]=(fb>>8)&1;
    for(let i=9;i<15;i++)m[14-i][8]=(fb>>i)&1;
    for(let i=0;i<8;i++)m[sz-1-i][8]=(fb>>i)&1;
    for(let i=8;i<15;i++)m[8][sz-15+i]=(fb>>i)&1;
    return {matrix:m,size:sz};
  }
  return {encode:encode};
})();

// ============================================================
// CORP HEIST — INTEGRATED WEALTH CARD

// Loot rendered via 1200 math algorithms

const C=document.getElementById('c');
const X=C.getContext('2d');
const W=C.width,H=C.height;
const PHI=1.618033988749,TAU=Math.PI*2;

// ====== PHI-TONE AUDIO SYNTH (WebAudio, golden-ratio harmonics) ======
const SFX={ctx:null,master:null,on:true};
function sfxInit(){
    if(SFX.ctx)return;
    try{
        const AC=window.AudioContext||window.webkitAudioContext;
        SFX.ctx=new AC();
        SFX.master=SFX.ctx.createGain();
        SFX.master.gain.value=0.22;
        SFX.master.connect(SFX.ctx.destination);
    }catch(e){SFX.on=false;}
}
function sfxResume(){ if(SFX.ctx&&SFX.ctx.state==='suspended')SFX.ctx.resume(); }
// single golden-tuned tone
function sfxTone(freq,dur,type,vol,delay){
    if(!SFX.on)return; sfxInit(); if(!SFX.ctx)return; sfxResume();
    const c=SFX.ctx,t0=c.currentTime+(delay||0);
    const o=c.createOscillator(),g=c.createGain();
    o.type=type||'sine'; o.frequency.setValueAtTime(freq,t0);
    g.gain.setValueAtTime(0,t0);
    g.gain.linearRampToValueAtTime(vol||0.5,t0+0.01);

}

}

// ---- theme cross-fade engine ----
function hex2rgb(h){h=h.replace('#','');return [parseInt(h.substr(0,2),16),parseInt(h.substr(2,2),16),parseInt(h.substr(4,2),16)];}
function rgb2hex(a){return '#'+a.map(v=>Math.round(Math.max(0,Math.min(255,v))).toString(16).padStart(2,'0')).join('');}
function lerpHex(a,b,k){const A=hex2rgb(a),B=hex2rgb(b);return rgb2hex([A[0]+(B[0]-A[0])*k,A[1]+(B[1]-A[1])*k,A[2]+(B[2]-A[2])*k]);}

let THEME_TO=Object.assign({},CORP_THEMES[5]);
let THEME_T=1;   // 1 = settled
let THEME_IDX=5;
function setTheme(idx,instant){
    idx=((idx%CORP_THEMES.length)+CORP_THEMES.length)%CORP_THEMES.length;
    THEME_IDX=idx;
    if(instant){THEME_FROM=Object.assign({},CORP_THEMES[idx]);THEME_TO=Object.assign({},CORP_THEMES[idx]);THEME=Object.assign({},CORP_THEMES[idx]);THEME_T=1;return;}
    THEME_FROM=Object.assign({},THEME);   // start from whatever is on screen now
    THEME_TO=Object.assign({},CORP_THEMES[idx]);
    THEME_T=0;
}
// day/night phi-cycle: smooth 0..1 (deep night -> bright day), period ~ phi minutes
function dayNightK(t){
    // cosine cycle; period scaled by phi so it feels organic
    const period=TAU*PHI*22;   // ~ few minutes at 60fps
    return 0.5+0.5*Math.sin(t/PHI/6 - Math.PI/2);
}
function tickTheme(){
    if(THEME_T>=1)return;
    THEME_T=Math.min(1,THEME_T+0.035);
    const k=THEME_T<0.5?2*THEME_T*THEME_T:1-Math.pow(-2*THEME_T+2,2)/2; // ease in-out
    THEME.name=THEME_TO.name;
    THEME.accent=lerpHex(THEME_FROM.accent,THEME_TO.accent,k);
    THEME.bg=lerpHex(THEME_FROM.bg,THEME_TO.bg,k);
    THEME.aura=lerpHex(THEME_FROM.aura,THEME_TO.aura,k);
}

// index 10 = golden artifact (matches server cat:10)
function drawGoldenArtifact(ctx,x,y,s,code,rarity,seed){
    seed=seed||(code*0.013);
    const rot=frame*0.01 + seed;
    ctx.save();ctx.translate(x,y);ctx.rotate(rot);
    const hue=45+rarity*3;
    const gold='hsl('+hue+',100%,'+(60+rarity*4)+'%)';
    const goldD='hsl('+(hue-6)+',90%,'+(38+rarity*3)+'%)';
    // phi fractal: recursive golden-rect subdiv with arcs
    function phiRect(px,py,pw,ph,depth){
        if(depth<=0||pw<2||ph<2)return;
        ctx.strokeStyle=depth%2?gold:goldD;ctx.lineWidth=0.6+depth*0.15;
        ctx.strokeRect(px,py,pw,ph);
        if(pw>=ph){const q=ph;ctx.beginPath();ctx.arc(px+q,py+q,q,Math.PI,1.5*Math.PI);ctx.stroke();phiRect(px+q,py,pw-q,ph,depth-1);}
        else{const q=pw;ctx.beginPath();ctx.arc(px+q,py+q,q,1.5*Math.PI,TAU);ctx.stroke();phiRect(px,py+q,pw,ph-q,depth-1);}
    }
    const sz=s*0.8;
    phiRect(-sz/2,-sz/2,sz,sz/PHI,5);
    // central glow dot
    const g=ctx.createRadialGradient(0,0,0,0,0,sz*0.3);
    g.addColorStop(0,'hsla('+hue+',100%,80%,0.85)');g.addColorStop(1,'hsla('+hue+',100%,60%,0)');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(0,0,sz*0.3,0,TAU);ctx.fill();
    ctx.restore();
    // phi-pollen particles (stationary, drawn in world space)
    ctx.save();
    for(let i=0;i<6;i++){
        const a=seed+i*PHI*TAU/6 + frame*0.03;
        const r=sz*(0.45+0.12*Math.sin(frame*0.05+i));
        const px=x+Math.cos(a)*r, py=y+Math.sin(a)*r;
        ctx.fillStyle='hsla('+hue+',100%,75%,'+(0.5+0.3*Math.sin(frame*0.1+i))+')';
        ctx.beginPath();ctx.arc(px,py,1.1,0,TAU);ctx.fill();
    }
    ctx.restore();
}

function rr(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}

function gem(ctx,x,y,r,hue,rar){

    ctx.closePath();
    const g=ctx.createLinearGradient(x-r,y-r,x+r,y+r);

// ====== PORTFOLIO ======
function rollRarity(){const r=Math.random()*10000;if(r<10)return 5;if(r<50)return 4;if(r<300)return 3;if(r<1000)return 2;if(r<3000)return 1;return 0;}

function newPortfolio(){
    const ns=Math.floor(Math.random()*8)+2,nl=Math.floor(Math.random()*10)+3;
    const stocks=[];for(let i=0;i<ns;i++){stocks.push({name:SNAMES[Math.floor(Math.random()*SNAMES.length)],price:Math.random()*300+10,held:Math.floor(Math.random()*200)+1,delta:(Math.random()-0.5)*10,vol:Math.floor(Math.random()*10000)});}
    const loot=[];for(let i=0;i<nl;i++){const r=rollRarity();loot.push({code:Math.floor(Math.random()*65535),rarity:r,qty:Math.floor(Math.random()*5)+1,value:[10,50,250,1500,10000,50000][r]});}
    let nw=0;stocks.forEach(s=>{nw+=s.price*s.held});loot.forEach(l=>{nw+=l.value*l.qty});
    const cidx=Math.floor(Math.random()*CNAMES.length);
    P={name:PNAMES[Math.floor(Math.random()*PNAMES.length)],corp:CNAMES[cidx],level:Math.floor(Math.random()*50)+1,gold:Math.floor(Math.random()*500000),netWorth:nw,stocks,loot,
       history:genHist(nw),prestige:Math.floor(Math.random()*10),streak:Math.floor(Math.random()*90),rank:Math.floor(Math.random()*100)+1,floor:Math.floor(Math.random()*12)};
    setTheme(cidx%CORP_THEMES.length);
    frame=0;
}
function genHist(nw){const h=[];let v=nw*0.1;for(let i=0;i<150;i++){v+=v*0.02*(Math.random()-0.48);h.push(v);}return h;}
function cubeHist(uid,nw){if(window.MarketCube&&typeof uid==='number'){try{const now=Math.floor(Date.now()/1000);return window.MarketCube.capitalSeries(uid|0,Math.round(nw),now,3600,48);}catch(e){}}return genHist(nw);}
function drawWelfare(x,y,w,h,tc){
    const MC=window.MarketCube;
    X.strokeStyle='#1a1a2e';X.lineWidth=0.5;X.strokeRect(x,y,w,h);
    X.fillStyle='#555';X.font='7px monospace';X.textAlign='left';X.fillText('WELFARE (STANDARD OF LIVING)',x+3,y+9);
    if(!MC||P.uid==null){X.fillStyle='#444';X.font='7px monospace';X.fillText('cube unavailable',x+3,y+h/2);return;}
    let q,ex;try{const now=Math.floor(Date.now()/1000);q=MC.welfareQuotes(P.uid|0,now,8);ex=MC.welfareExplain(P.uid|0,now);}catch(e){return;}
    if(!q||!q.length)return;
    let lo=Infinity,hi=-Infinity;q.forEach(c=>{if(c.l<lo)lo=c.l;if(c.h>hi)hi=c.h;});
    const fl=q[q.length-1].floor;if(fl<lo)lo=fl;
    lo*=0.98;hi*=1.02;const rng=hi-lo||1;
    const top=y+13,bh=h-20,cw=w/q.length,bw=Math.max(2,cw*0.5);
    const yOf=v=>top+bh-((v-lo)/rng)*bh;
    // floor line
    X.strokeStyle='#664400';X.lineWidth=0.5;X.setLineDash([2,2]);
    X.beginPath();X.moveTo(x+2,yOf(fl));X.lineTo(x+w-2,yOf(fl));X.stroke();X.setLineDash([]);
    // candles
    q.forEach((c,i)=>{
        const cx=x+i*cw+cw/2;const up=c.c>=c.o;const col=up?'#38d66a':'#ff4b4b';
        X.strokeStyle=col;X.lineWidth=0.8;
        X.beginPath();X.moveTo(cx,yOf(c.h));X.lineTo(cx,yOf(c.l));X.stroke();
        const oy=yOf(c.o),cy=yOf(c.c);const bt=Math.min(oy,cy),bb=Math.max(oy,cy);
        X.fillStyle=col;X.fillRect(cx-bw/2,bt,bw,Math.max(1,bb-bt));
    });
    // labels: current welfare + tier
    X.fillStyle=tc;X.font='7px monospace';X.textAlign='right';
    X.fillText('LVL '+ex.living_tier+'  $'+fmt(ex.welfare),x+w-3,y+9);
    const trUp=ex.market_trend_q16>=0;
    X.fillStyle=trUp?'#38d66a':'#ff4b4b';X.textAlign='left';
    X.fillText('mkt '+(trUp?'+':'')+(ex.market_trend_q16/655.36).toFixed(1)+'%',x+3,y+h-3);
    X.fillStyle='#664400';X.textAlign='right';X.fillText('floor $'+fmt(fl),x+w-3,y+h-3);
}
function dropLoot(){const r=rollRarity();const v=[10,50,250,1500,10000,50000][r];P.loot.push({code:Math.floor(Math.random()*65535),rarity:r,qty:1,value:v});P.netWorth+=v;P.gold+=v;if(P.history.length)P.history.push(P.history[P.history.length-1]+v*0.3);SND.loot(r);}

// ====== RENDER ======
function fmt(n){if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1e3)return(n/1e3).toFixed(1)+'K';return ''+n;}

// --- Golden section helpers (phi = 1.618...) ---

// Golden rectangle subdivided into squares with quarter-circle arcs
function drawGoldenRect(x,y,w,h,depth,col,alpha){
    if(depth<=0||w<6||h<6)return;
    X.save();
    X.globalAlpha=alpha;
    X.strokeStyle=col;X.lineWidth=0.5;
    X.strokeRect(x,y,w,h);
    // square on the shorter side
    if(w>=h){
        const s=h;
        X.beginPath();X.arc(x+s,y+s,s,Math.PI,1.5*Math.PI);X.stroke(); // top-right arc
        drawGoldenRect(x+s,y,w-s,h,depth-1,col,alpha*0.85);
    }else{
        const s=w;
        X.beginPath();X.arc(x+s,y+s,s,1.5*Math.PI,2*Math.PI);X.stroke(); // bottom-right arc
        drawGoldenRect(x,y+s,w,h-s,depth-1,col,alpha*0.85);
    }
    X.restore();
}

// True logarithmic golden spiral: r = a * phi^(theta * 2/pi)
function drawGoldenSpiral(cx,cy,maxR,turns,t,col){
    const a=maxR/Math.pow(PHI,turns*2); // scale so it fits maxR
    X.save();
    X.globalAlpha=0.22;
    X.strokeStyle=col;X.lineWidth=1.2;
    X.beginPath();
    const steps=400;
    for(let i=0;i<=steps;i++){
        const th=(i/steps)*turns*TAU + t*0.15;
        const r=a*Math.pow(PHI, th/(TAU/2));
        if(r>maxR*1.6)break;
        const px=cx+r*Math.cos(th), py=cy+r*Math.sin(th);
        i===0?X.moveTo(px,py):X.lineTo(px,py);
    }
    X.stroke();
    X.restore();
}

// Fractal phi-tree (Pythagoras tree with golden branch ratio)
function drawPhiTree(x,y,len,ang,depth,t,col){
    if(depth<=0||len<3)return;
    const x2=x+Math.cos(ang)*len, y2=y+Math.sin(ang)*len;
    X.strokeStyle=col;X.globalAlpha=0.02+depth*0.006;X.lineWidth=0.3+depth*0.12;
    X.beginPath();X.moveTo(x,y);X.lineTo(x2,y2);X.stroke();
    const sway=Math.sin(t*0.3+depth)*0.08;
    const spread=0.5+sway;
    drawPhiTree(x2,y2,len/PHI,ang-spread,depth-1,t,col);
    drawPhiTree(x2,y2,len/PHI,ang+spread,depth-1,t,col);
}

// ====== RAID TITAN (phi-fractal boss) ======
// Recursive golden-angle limbs radiating from a pulsing core.
function drawTitanLimb(cx,cy,len,ang,depth,t,col,alpha){
    if(depth<=0||len<4)return;
    const x2=cx+Math.cos(ang)*len, y2=cy+Math.sin(ang)*len;
    X.strokeStyle=col;X.globalAlpha=alpha;X.lineWidth=0.4+depth*0.5;
    X.beginPath();X.moveTo(cx,cy);X.lineTo(x2,y2);X.stroke();
    // joint node
    X.fillStyle=col;X.globalAlpha=alpha*0.8;
    X.beginPath();X.arc(x2,y2,0.6+depth*0.5,0,TAU);X.fill();
    const golden=2.399963;   // golden angle (rad)
    const wob=Math.sin(t*1.3+depth)*0.12;
    drawTitanLimb(x2,y2,len/PHI,ang-golden+wob,depth-1,t,col,alpha*0.92);
    drawTitanLimb(x2,y2,len/PHI,ang+golden*0.5+wob,depth-1,t,col,alpha*0.92);
}
function drawTitan(cx,cy,size,t){
    const hurt=RAIDVIZ.flash;
    const dead=RAIDVIZ.defeated;
    const baseCol=dead?'#3a3a4a':(hurt>0.02?'#FF9B4B':'#FF4B4B');
    const pulse=1+Math.sin(t*(dead?0.4:1.6))*0.06;
    X.save();
    // outer glow ring
    X.globalAlpha=dead?0.08:0.16+hurt*0.25;
    const g=X.createRadialGradient(cx,cy,size*0.2,cx,cy,size*1.5);
    g.addColorStop(0,baseCol);g.addColorStop(1,'#0a0a1200');
    X.fillStyle=g;X.beginPath();X.arc(cx,cy,size*1.5,0,TAU);X.fill();
    // radiating fractal limbs (8 arms, golden-angle offset)
    const arms=8;
    for(let i=0;i<arms;i++){
        const a=i*TAU/arms + t*(dead?0.05:0.25);
        drawTitanLimb(cx,cy,size*0.6*pulse,a,4,t,baseCol,dead?0.15:0.5);
    }
    // core: golden nested rings
    for(let k=0;k<4;k++){
        const rr=size*0.28*pulse/Math.pow(PHI,k*0.5);
        X.globalAlpha=(dead?0.2:0.55)-k*0.08;
        X.strokeStyle=k===0?'#FFC800':baseCol;X.lineWidth=1.4-k*0.3;
        X.beginPath();X.arc(cx,cy,rr,0,TAU);X.stroke();
    }
    // core eye
    X.globalAlpha=dead?0.3:0.9;
    X.fillStyle=dead?'#555':'#FFC800';
    X.beginPath();X.arc(cx,cy,size*0.06*pulse,0,TAU);X.fill();
    X.restore();
    if(RAIDVIZ.flash>0)RAIDVIZ.flash*=0.88;
}
// animated HP bar with phi-segment ticks
function drawHpBar(x,y,w,h,pct,t){
    X.save();
    X.fillStyle='#1a0a0a';X.fillRect(x,y,w,h);
    const fw=w*Math.max(0,Math.min(1,pct/100));
    const grad=X.createLinearGradient(x,0,x+w,0);
    grad.addColorStop(0,'#FF4B4B');grad.addColorStop(0.6,'#FF9B4B');grad.addColorStop(1,'#FFC800');
    X.fillStyle=grad;X.fillRect(x,y,fw,h);
    // shimmer
    X.globalAlpha=0.25+0.15*Math.sin(t*3);
    X.fillStyle='#fff';X.fillRect(x+fw-3,y,3,h);X.globalAlpha=1;
    // phi tick marks (at 1/phi, 1/phi^2 ...)
    X.strokeStyle='#0a0a12';X.lineWidth=0.6;
    let p=1/PHI;
    for(let i=0;i<4;i++){X.beginPath();X.moveTo(x+w*p,y);X.lineTo(x+w*p,y+h);X.stroke();p/=PHI;}
    X.strokeStyle='#FF4B4B';X.lineWidth=0.6;X.strokeRect(x,y,w,h);
    X.restore();
}
// hit particles (golden pollen burst on strike)
const HITP=[];
function spawnHitParticles(){

// ====== VICTORY: full-screen phi loot-burst on boss defeat ======
const VICTORY={active:false,t:0,pool:0,shards:[]};
function triggerVictory(pool){
    VICTORY.active=true;VICTORY.t=0;VICTORY.pool=pool||0;VICTORY.shards=[];SND.victory();
    const golden=2.399963;   // golden angle
    // fountain of loot shards along the golden angle
    for(let i=0;i<80;i++){
        const a=i*golden;
        const sp=1.5+ (i/80)*4.5;
        VICTORY.shards.push({
            a:a, r:0, sp:sp, life:1,
            cat:Math.floor(Math.random()*11),
            code:Math.floor(Math.random()*65535),
            rar:Math.random()<0.15?5:Math.floor(Math.random()*5),
            spin:Math.random()*TAU
        });
    }
}
function drawVictory(){
    if(!VICTORY.active)return;
    VICTORY.t+=0.016;
    const t=VICTORY.t, cx=W/2, cy=H/2;
    const dur=3.2;
    const k=Math.min(1,t/dur);
    // darken backdrop then fade out
    X.save();
    X.globalAlpha=(k<0.7?0.55:0.55*(1-(k-0.7)/0.3));
    X.fillStyle='#000';X.fillRect(0,0,W,H);
    X.restore();

    // expanding golden phi-spiral shockwave
    X.save();
    const rings=3;
    for(let rg=0;rg<rings;rg++){
        const rt=t-rg*0.18;if(rt<0)continue;
        X.globalAlpha=Math.max(0,0.5-rt*0.15);
        X.strokeStyle=THEME.aura;X.lineWidth=2.2-rg*0.5;
        X.beginPath();
        const turns=4, steps=260;
        const maxR=rt*260;
        for(let i=0;i<=steps;i++){
            const th=(i/steps)*turns*TAU + t*0.6;
            const r=(maxR/Math.pow(PHI,turns*2))*Math.pow(PHI,th/(TAU/2));
            if(r>maxR)break;
            const px=cx+r*Math.cos(th), py=cy+r*Math.sin(th);
            i===0?X.moveTo(px,py):X.lineTo(px,py);
        }
        X.stroke();
    }
    X.restore();

    // loot shards flying outward along golden angle
    for(const s of VICTORY.shards){
        s.r+=s.sp; s.sp*=0.985; s.life-=0.006; s.spin+=0.08;
        if(s.life<=0)continue;
        const px=cx+Math.cos(s.a)*s.r*(1+t*0.05);
        const py=cy+Math.sin(s.a)*s.r*(1+t*0.05) + t*t*8; // slight gravity
        const sz=6+ s.rar*1.5;
        X.save();X.globalAlpha=Math.max(0,s.life);
        try{
            const {fn}=getRenderer(s.code);
            if(s.cat===10) fn(X,px,py,sz,s.code,s.rar,s.code*0.013);
            else fn(X,px,py,sz,s.code,s.rar);
        }catch(e){
            X.fillStyle=RCOL[s.rar];X.beginPath();X.arc(px,py,sz*0.4,0,TAU);X.fill();
        }
        X.restore();
    }

    // centered banner
    X.save();
    const pop=Math.min(1,t*3);
    X.globalAlpha=Math.min(1,k<0.85?1:(1-(k-0.85)/0.15));
    X.textAlign='center';
    X.shadowColor=THEME.aura;X.shadowBlur=24;
    X.fillStyle=THEME.aura;X.font='bold '+(30*pop)+'px monospace';
    X.fillText('BOSS DEFEATED',cx,cy-6);
    X.shadowBlur=8;X.fillStyle='#FFD700';X.font='bold 16px monospace';
    X.fillText('φ LOOT POOL  +'+fmt(VICTORY.pool)+'g',cx,cy+22);
    X.restore();
    X.globalAlpha=1;

    if(t>=dur)VICTORY.active=false;
}

function drawPodiumEmblem(cx,cy,size,seed,t,col){

// ====== WORLD MAP (7 corp towers, live net-worth heights) ======
const WMAP={active:false,t:0,corps:[],polling:false};
const WMAP_COLORS=['#00E5FF','#FF7A00','#B14BFF','#00FF8C','#FF4B7A','#FFC800','#FFE24B'];
async function openWorldMap(){WMAP.active=true;WMAP.t=0;await refreshWorldMap();}
async function refreshWorldMap(){
    try{const d=await (await fetch(API+'/api/guilds')).json();WMAP.corps=d||[];}catch(e){}
}
function drawWorldMap(){
    if(!WMAP.active)return;
    WMAP.t+=0.016;const t=WMAP.t;const k=Math.min(1,t/0.4);
    if(frame%180===0 && !WMAP.polling){WMAP.polling=true;refreshWorldMap().finally(()=>{WMAP.polling=false;});}
    // dusk sky gradient
    X.save();
    const sky=X.createLinearGradient(0,0,0,H);
    sky.addColorStop(0,'#0a0f1e');sky.addColorStop(0.6,'#1a1030');sky.addColorStop(1,'#050609');
    X.globalAlpha=0.97*k;X.fillStyle=sky;X.fillRect(0,0,W,H);X.restore();
    // stars
    X.globalAlpha=0.5*k;X.fillStyle='#fff';
    for(let i=0;i<40;i++){const sx=(i*137.5)%W,sy=(i*53.7)%(H*0.4);
        if((Math.sin(t*2+i)+1)>1.2)X.fillRect(sx,sy,1,1);}
    X.globalAlpha=1;
    X.textAlign='center';X.fillStyle='#00E5FF';X.font='bold 22px monospace';
    X.shadowColor='#00E5FF';X.shadowBlur=14*k;X.fillText('CORP SKYLINE',W/2,H*0.1);X.shadowBlur=0;
    const corps=WMAP.corps;
    if(!corps.length){X.fillStyle='#888';X.font='11px monospace';X.fillText('loading...',W/2,H/2);return;}
    const n=corps.length;
    const maxNet=Math.max(...corps.map(c=>c.net||1));
    const groundY=H*0.88, towerW=(W-80)/n*0.62, gap=(W-80)/n;
    for(let i=0;i<n;i++){
        const c=corps[i];const col=WMAP_COLORS[i%WMAP_COLORS.length];
        const rel=Math.log10(Math.max(10,c.net))/Math.log10(Math.max(100,maxNet));
        // height grows on a phi curve of relative wealth
        const th=(H*0.5)*Math.pow(rel,1/PHI)*Math.min(1,(t-i*0.08)*2);
        if(th<=1)continue;
        const tx=40+gap*i+(gap-towerW)/2;
        const ty=groundY-th;
        // tower body
        X.fillStyle='#0c0e18';X.fillRect(tx,ty,towerW,th);
        X.strokeStyle=col;X.lineWidth=1.2;X.strokeRect(tx,ty,towerW,th);
        // lit windows (live flicker)
        const rows=Math.floor(th/9),cols=Math.max(2,Math.floor(towerW/7));
        for(let r=0;r<rows;r++)for(let cc=0;cc<cols;cc++){
            const seed=(i*31+r*7+cc*3);
            const lit=(Math.sin(t*1.5+seed)+1)/2 > 0.45;
            X.globalAlpha=lit?(0.5+0.4*Math.sin(t*3+seed)):0.06;
            X.fillStyle=lit?col:'#111';
            X.fillRect(tx+3+cc*(towerW-6)/cols, ty+4+r*9, (towerW-6)/cols-1.5, 5);
        }
        X.globalAlpha=1;
        // rooftop beacon
        X.fillStyle=col;X.shadowColor=col;X.shadowBlur=8+4*Math.sin(t*4+i);
        X.beginPath();X.arc(tx+towerW/2,ty-3,2.5,0,TAU);X.fill();X.shadowBlur=0;
        // rank crown on tallest
        if(c.rank===1){X.fillStyle='#FFC800';X.font='12px monospace';X.fillText('👑',tx+towerW/2,ty-10);}
        // labels
        X.save();X.translate(tx+towerW/2,groundY+12);
        X.fillStyle=col;X.font='bold 8px monospace';X.textAlign='center';
        X.fillText(c.name,0,0);
        X.fillStyle='#888';X.font='7px monospace';
        X.fillText('$'+fmt(c.net),0,10);
        X.fillStyle='#555';X.fillText('#'+c.rank+' · '+(c.members||0)+'👤',0,19);
        X.restore();
    }
    // ground line
    X.strokeStyle='#00E5FF44';X.lineWidth=1;X.beginPath();X.moveTo(0,groundY);X.lineTo(W,groundY);X.stroke();
    X.fillStyle='#00E5FF';X.globalAlpha=0.5;X.font='9px monospace';X.textAlign='center';
    X.fillText('▸ live corp net worth · click / ESC to close ◂',W/2,H-8);X.globalAlpha=1;
}

const DUEL={active:false,t:0,data:null,hpA:1,hpB:1,blows:[],hits:[],done:false};
function openDuelReplay(d){
    DUEL.active=true;DUEL.t=0;DUEL.data=d;DUEL.hpA=1;DUEL.hpB=1;DUEL.hits=[];DUEL.done=false;

// ====== 8-FIGHTER TOURNAMENT BRACKET (phi-seeded single elimination) ======
const TOURNEY={active:false,t:0,seeds:[],rounds:[],winner:null,champT:0};
async function openTourney(){
    let pool=[];
    try{
        const r=await fetch(API+'/api/leaderboard');const d=await r.json();
        pool=d.slice(0,16).map(p=>({name:p.name,pow:p.net_worth||1,corp:p.corp}));
    }catch(e){}
    // ensure the player is included
    pool.unshift({name:(P.name||'YOU')+'*',pow:P.netWorth||1,corp:THEME.name});
    // sort by power then take top 8, seed 1..8
    pool.sort((a,b)=>b.pow-a.pow);
    let seeds=pool.slice(0,8);
    while(seeds.length<8)seeds.push({name:'BYE'+seeds.length,pow:1,corp:'—'});
    // standard bracket order: 1v8 4v5 2v7 3v6 (phi-weighted upset chance)
    const ord=[0,7,3,4,1,6,2,5];
    TOURNEY.seeds=ord.map((i,idx)=>({...seeds[i],seed:i+1}));
    TOURNEY.rounds=[TOURNEY.seeds.slice()];
    TOURNEY.winner=null;TOURNEY.champT=0;TOURNEY.active=true;TOURNEY.t=0;
    // precompute results: higher seed favored, phi-swing allows upsets
    let cur=TOURNEY.seeds.slice();
    while(cur.length>1){
        const next=[];
        for(let i=0;i<cur.length;i+=2){
            const a=cur[i],b=cur[i+1];
            const ratio=a.pow/(a.pow+b.pow);
            const swing=(Math.random()-0.5)*(1/PHI);   // phi-scaled randomness
            const aWins=(ratio+swing)>=0.5;
            next.push(aWins?a:b);
        }
        cur=next;TOURNEY.rounds.push(cur.slice());
    }
    TOURNEY.winner=cur[0];
}
function drawTourney(){
    if(!TOURNEY.active)return;
    TOURNEY.t+=0.016;const t=TOURNEY.t;const k=Math.min(1,t/0.5);
    X.save();X.globalAlpha=0.95*k;X.fillStyle='#04050a';X.fillRect(0,0,W,H);X.restore();
    X.textAlign='center';X.shadowColor=THEME.aura;X.shadowBlur=16*k;
    X.fillStyle=THEME.aura;X.font='bold 22px monospace';X.fillText('PHI TOURNAMENT',W/2,H*0.09);
    X.shadowBlur=0;X.fillStyle='#888';X.font='9px monospace';
    X.fillText('8 fighters · phi-seeded single elimination',W/2,H*0.09+16);
    const R=TOURNEY.rounds;   // R[0]=8, R[1]=4, R[2]=2, R[3]=1 champ
    const colW=(W-80)/4;      // 4 columns: R16?no -> QF(8/2 shown as 8 slots), SF, F, champ
    const top=H*0.18, bot=H*0.9, colX=40;
    // reveal rounds progressively
    const roundReveal=Math.floor(t/1.1);   // new round every 1.1s
    // draw each stage column: stage 0 shows 8 entrants (round0), stage c shows winners round c
    const stages=[R[0],R[1],R[2],[TOURNEY.winner]];
    for(let s=0;s<4;s++){
        if(s>roundReveal)continue;
        const list=stages[s];if(!list)continue;
        const cx=colX+s*colW;
        const slotH=(bot-top)/list.length;
        for(let i=0;i<list.length;i++){
            const f=list[i];if(!f)continue;
            const y=top+slotH*i+slotH/2;
            const w=colW-18, h=Math.min(26,slotH-6);
            const isChamp=(s===3);
            const app=Math.min(1,(t-s*1.1)*3);if(app<=0)continue;
            X.globalAlpha=app;
            X.fillStyle=isChamp?THEME.accent:'#12131f';
            X.fillRect(cx,y-h/2,w,h);
            X.strokeStyle=isChamp?THEME.aura:THEME.accent+'66';X.lineWidth=isChamp?2:0.8;
            X.strokeRect(cx,y-h/2,w,h);
            X.fillStyle=isChamp?'#05060c':'#ddd';X.font=(isChamp?'bold 10px':'9px')+' monospace';
            X.textAlign='left';
            X.fillText('#'+(f.seed||'?')+' '+f.name.slice(0,10),cx+5,y+3);
            // connector lines to next column
            if(s<3){
                X.strokeStyle=THEME.accent+'40';X.lineWidth=0.6;X.globalAlpha=app*0.6;
                X.beginPath();X.moveTo(cx+w,y);X.lineTo(cx+colW,top+((bot-top)/(stages[s+1].length))*(Math.floor(i/2)+0.5));X.stroke();
            }
            X.globalAlpha=1;
        }
        // column label
        X.fillStyle='#666';X.font='8px monospace';X.textAlign='left';
        X.fillText(['QUARTER','SEMI','FINAL','CHAMPION'][s],cx,top-8);
    }
    // champion crown reveal
    if(roundReveal>=3 && TOURNEY.winner){
        if(TOURNEY.champT===0){TOURNEY.champT=t;SND.victory();}
        const ct=t-TOURNEY.champT;
        X.textAlign='center';X.fillStyle=THEME.aura;X.font='bold 16px monospace';
        X.shadowColor=THEME.aura;X.shadowBlur=14;
        X.fillText('👑 '+TOURNEY.winner.name+' 👑',W/2,H*0.13);X.shadowBlur=0;
        if(ct<0.1)for(let i=0;i<8;i++)setTimeout(launchFirework,i*90);
    }
    X.fillStyle=THEME.aura;X.globalAlpha=0.6+0.4*Math.sin(t*3);X.font='9px monospace';X.textAlign='center';

// ====== FULLSCREEN 3D TOWER TOUR (elevator ride through the floors) ======
const TOUR={active:false,t:0,pos:0,target:0,vel:0};
function openTour(){
    TOUR.active=true;TOUR.t=0;
    TOUR.pos=(P.floor||0);        // start at the player's floor
    TOUR.target=FLOOR_NAMES.length-1; // ride all the way to Apex Atrium
    TOUR.vel=0;
}
function drawTour(){
    if(!TOUR.active)return;
    TOUR.t+=0.016;const t=TOUR.t;
    const n=FLOOR_NAMES.length;
    // ease elevator toward target, then bounce back down, looping the tour
    const d=TOUR.target-TOUR.pos;
    TOUR.vel+=(d)*0.0016; TOUR.vel*=0.94; TOUR.pos+=TOUR.vel;
    if(Math.abs(d)<0.02 && Math.abs(TOUR.vel)<0.002){
        TOUR.target=(TOUR.target>n/2)?0:n-1;   // reverse direction
    }
    const cx=W/2, cy=H/2;
    // backdrop
    const k=Math.min(1,t/0.5);
    X.save();X.globalAlpha=0.94*k;X.fillStyle='#04050a';X.fillRect(0,0,W,H);X.restore();
    // vanishing-point corridor: floors as receding rectangles
    const FLOOR_GAP=1.0;   // world units between floors
    const focal=520;
    // draw from far floors to near for correct overlap
    const list=[];
    for(let i=n-1;i>=-1;i--){
        const rel=(i-TOUR.pos);            // signed distance in floors
        const z=rel*FLOOR_GAP*260 + 60;    // depth; current floor near camera
        if(z<=8)continue;                  // behind camera
        list.push({i,rel,z});
    }
    list.sort((a,b)=>b.z-a.z);
    for(const f of list){
        const s=focal/f.z;                 // perspective scale
        const fw=W*1.4*s, fh=H*0.55*s;
        const yOff=(-f.rel)* (H*0.16);      // vertical shift so we look "up/down" the shaft
        const fx=cx-fw/2, fy=cy-fh/2 - yOff*s;
        const near=(Math.abs(f.rel)<0.6);
        const glow=Math.max(0,1-Math.abs(f.rel)/4);
        X.save();
        X.globalAlpha=(0.15+0.75*glow)*k;
        // floor slab (perspective quad ~ rectangle)
        X.strokeStyle=(f.i===Math.round(TOUR.pos))?THEME.aura:THEME.accent;
        X.lineWidth=Math.max(0.4,2*s);
        X.strokeRect(fx,fy,fw,fh);
        // inner golden-section divider
        X.globalAlpha=(0.08+0.4*glow)*k;
        X.beginPath();X.moveTo(fx+fw/PHI,fy);X.lineTo(fx+fw/PHI,fy+fh);X.stroke();
        // floor label when large enough
        if(fw>90 && f.i>=0){
            X.globalAlpha=(0.5+0.5*glow)*k;
            X.fillStyle=(near?THEME.aura:THEME.accent);
            X.font=Math.max(7,Math.min(30,18*s))+'px monospace';
            X.textAlign='center';
            X.fillText((f.i+1)+' · '+FLOOR_NAMES[f.i], cx, fy+fh/2);
        }
        X.restore();
    }
    X.globalAlpha=1;
    // elevator cab frame (fixed foreground)
    X.save();
    X.strokeStyle=THEME.aura;X.shadowColor=THEME.aura;X.shadowBlur=14;
    X.lineWidth=3;X.strokeRect(cx-140,cy-120,280,240);
    X.shadowBlur=0;
    // doors seam
    X.globalAlpha=0.5;X.lineWidth=1;
    X.beginPath();X.moveTo(cx,cy-120);X.lineTo(cx,cy+120);X.stroke();
    X.restore();X.globalAlpha=1;
    // HUD readout
    const cf=Math.round(TOUR.pos);
    X.textAlign='center';X.shadowColor=THEME.aura;X.shadowBlur=16*k;
    X.fillStyle=THEME.aura;X.font='bold 22px monospace';
    X.fillText('CORP TOWER',cx,H*0.12);
    X.shadowBlur=0;X.fillStyle='#ccc';X.font='13px monospace';
    X.fillText('▲ FLOOR '+(cf+1)+' · '+FLOOR_NAMES[Math.max(0,Math.min(n-1,cf))],cx,H*0.12+22);
    // rising cable motes for motion feel
    X.globalAlpha=0.5;X.fillStyle=THEME.accent;
    for(let m=0;m<10;m++){
        const my=((t*260 + m*70)% (H+40))-20;
        X.fillRect(cx-150,H-my,2,10);X.fillRect(cx+148,H-my,2,10);
    }
    X.globalAlpha=1;
    X.fillStyle=THEME.aura;X.globalAlpha=0.6+0.4*Math.sin(t*3);X.font='9px monospace';
    X.fillText('▸ click / tap anywhere to exit tour ◂',cx,H-10);X.globalAlpha=1;
}

// ====== PRESTIGE AURA (ranked golden rings around the whole card) ======
function drawPrestigeAura(t){
    const p=P.prestige||0;
    if(p<=0)return;
    const cx=W/2, cy=H/2;
    const rings=Math.min(p,8);
    X.save();
    for(let i=0;i<rings;i++){
        const baseR=Math.max(W,H)*0.5 + 6 + i*7;
        const rot=t*(0.05+i*0.02)*(i%2?-1:1);
        const seg=Math.floor(PHI*(i+3));   // phi-ish segment count
        X.globalAlpha=0.10+0.03*Math.sin(t*1.5+i);
        X.strokeStyle=i===rings-1?'#FF6BD6':THEME.aura;
        X.lineWidth=0.8;
        X.beginPath();
        for(let s=0;s<=seg;s++){
            const a=rot+s*TAU/seg;
            const rr=baseR+Math.sin(a*PHI+t)*3;
            const px=cx+rr*Math.cos(a), py=cy+rr*Math.sin(a);
            s===0?X.moveTo(px,py):X.lineTo(px,py);
        }
        X.stroke();
    }
    // prestige badge (top-center)
    X.globalAlpha=0.85;X.fillStyle='#FF6BD6';X.font='bold 9px monospace';X.textAlign='center';
    X.fillText('✦ PRESTIGE '+p+' — ×'+(Math.pow(PHI,p)).toFixed(2)+' ✦',cx,16);
    X.restore();
    X.globalAlpha=1;
}

        X.globalAlpha=Math.max(0,s.life);
        X.fillStyle=s.col;X.shadowColor=s.col;X.shadowBlur=6;

// ====== LIVE STOCK MINI-CHART (rolling candlestick of the top holding) ======
const CHARTBUF={sym:null, ticks:[]};   // ticks: {o,h,l,c}
let _chartAccum=0, _chartOpen=null;
function updateChart(){
    const st=(P.stocks&&P.stocks.length)?P.stocks[0]:null;
    if(!st)return;
    if(CHARTBUF.sym!==st.name){CHARTBUF.sym=st.name;CHARTBUF.ticks=[];_chartOpen=st.price;}
    const p=st.price;
    if(_chartOpen==null)_chartOpen=p;
    // form a new candle every ~24 frames
    _chartAccum++;
    let cur=CHARTBUF.ticks[CHARTBUF.ticks.length-1];
    if(!cur || _chartAccum>=24){
        cur={o:_chartOpen,h:p,l:p,c:p};CHARTBUF.ticks.push(cur);_chartAccum=0;_chartOpen=p;
        if(CHARTBUF.ticks.length>40)CHARTBUF.ticks.shift();
    }else{
        cur.c=p; if(p>cur.h)cur.h=p; if(p<cur.l)cur.l=p;
    }
}
function drawStockChart(x,y,w,h,t){
    updateChart();
    const ticks=CHARTBUF.ticks;
    X.save();
    X.fillStyle='#05060c';X.globalAlpha=0.55;X.fillRect(x,y,w,h);X.globalAlpha=1;
    X.strokeStyle=THEME.accent+'40';X.lineWidth=0.6;X.strokeRect(x,y,w,h);
    X.fillStyle=THEME.accent;X.font='7px monospace';X.textAlign='left';
    X.fillText('LIVE · '+(CHARTBUF.sym||'—'),x+3,y-3);
    if(ticks.length<2){X.restore();return;}
    let lo=Infinity,hi=-Infinity;
    for(const c of ticks){if(c.l<lo)lo=c.l;if(c.h>hi)hi=c.h;}
    const pad=(hi-lo)*0.12||1; lo-=pad; hi+=pad;
    const sc=v=>y+h-4-((v-lo)/(hi-lo))*(h-8);
    const cw=(w-8)/40;
    for(let i=0;i<ticks.length;i++){
        const c=ticks[i];const cx=x+4+i*cw+cw/2;
        const up=c.c>=c.o;const col=up?'#00FF8C':'#FF3B3B';
        X.strokeStyle=col;X.lineWidth=0.7;
        X.beginPath();X.moveTo(cx,sc(c.h));X.lineTo(cx,sc(c.l));X.stroke();
        X.fillStyle=col;
        const yo=sc(c.o),yc=sc(c.c);const bt=Math.min(yo,yc),bh=Math.max(1,Math.abs(yc-yo));
        X.fillRect(cx-cw*0.32,bt,cw*0.64,bh);
    }
    // last price tag
    const last=ticks[ticks.length-1];
    X.fillStyle=last.c>=last.o?'#00FF8C':'#FF3B3B';X.font='8px monospace';X.textAlign='right';
    X.fillText('$'+last.c.toFixed(1),x+w-3,y+9);
    X.restore();X.globalAlpha=1;
}

// ====== BADGE SHELF (unlocked achievement medals, phi-fractal) ======
function drawBadge(cx,cy,r,seed,t,col){
    const golden=2.399963, sides=3+(seed%4);
    X.save();X.translate(cx,cy);X.rotate(t*0.3+seed);
    let rr=r;
    for(let l=0;l<3;l++){
        X.globalAlpha=0.9-l*0.2;X.strokeStyle=col;X.lineWidth=1.1-l*0.25;
        X.beginPath();
        for(let s=0;s<=sides;s++){const a=s*TAU/sides+l*golden;s===0?X.moveTo(Math.cos(a)*rr,Math.sin(a)*rr):X.lineTo(Math.cos(a)*rr,Math.sin(a)*rr);}
        X.stroke();rr/=PHI;
    }
    X.globalAlpha=1;X.fillStyle=col;X.shadowColor=col;X.shadowBlur=6;
    X.beginPath();X.arc(0,0,r*0.22,0,TAU);X.fill();X.restore();X.globalAlpha=1;
}
function drawBadges(x,y,t){
    if(!BADGES||!BADGES.length)return;
    X.fillStyle=THEME.accent;X.font='6px monospace';X.textAlign='left';X.globalAlpha=0.8;
    X.fillText('BADGES '+BADGES.length,x,y-8);X.globalAlpha=1;

    for(let i=0;i<Math.min(BADGES.length,per*2);i++){

        drawBadge(cx,cy,6,i+3,t,i%2?THEME.aura:THEME.accent);
    }
}

// ====== CORP FLOORS MINI-MAP (phi-spaced levels + animated elevator) ======
const FLOOR_NAMES=['Lobby','Trading','Vault','Boardroom','Data Ctr','Sky Garden','Penthouse','Cloud Spire','Gold Rsv','Quantum','Throne','Apex Atrium'];
let ELEV_Y=null;   // animated elevator position (smoothed)
function drawFloorMap(x,y,w,h,t){
    const n=FLOOR_NAMES.length;
    const cur=Math.max(0,Math.min(n-1, P.floor||0));
    // phi-weighted row heights: taller near the bottom (grander lower floors)
    const weights=[];let sum=0;
    for(let i=0;i<n;i++){const wgt=Math.pow(PHI,(i)/6);weights.push(wgt);sum+=wgt;}
    // panel
    X.save();
    X.fillStyle='#05060c';X.globalAlpha=0.6;X.fillRect(x,y,w,h);X.globalAlpha=1;
    X.strokeStyle=THEME.accent+'50';X.lineWidth=0.6;X.strokeRect(x,y,w,h);
    X.fillStyle=THEME.accent;X.font='7px monospace';X.textAlign='left';
    X.fillText('CORP TOWER',x+4,y-3);

    // rows from top(highest floor index) down to bottom(Lobby)
    let yy=y+4;
    const rows=[];   // store center Y per floor index
    for(let i=n-1;i>=0;i--){
        const rh=(h-8)*weights[i]/sum;
        const up=i%2===0;
        // floor slab
        X.globalAlpha=(i===cur?0.9:0.35);
        X.fillStyle=(i===cur?THEME.accent:'#1a1b28');
        X.fillRect(x+16,yy,w-22,Math.max(2,rh-1.5));
        // label
        X.globalAlpha=(i===cur?1:0.5);
        X.fillStyle=(i===cur?'#05060c':THEME.accent);
        X.font='6px monospace';X.textAlign='left';
        X.fillText((i+1)+'·'+FLOOR_NAMES[i], x+18, yy+Math.max(6,rh/2+2));
        rows[i]=yy+rh/2;
        yy+=rh;
    }
    X.globalAlpha=1;
    // elevator shaft on the left edge
    X.strokeStyle=THEME.accent+'40';X.lineWidth=1;
    X.beginPath();X.moveTo(x+9,y+4);X.lineTo(x+9,y+h-4);X.stroke();
    // elevator cab: ease toward current floor's Y
    const targetY=rows[cur];
    if(ELEV_Y==null)ELEV_Y=targetY;
    ELEV_Y+=(targetY-ELEV_Y)*0.08;
    // cab glow
    X.save();
    X.shadowColor=THEME.aura;X.shadowBlur=8;
    X.fillStyle=THEME.aura;
    X.fillRect(x+6,ELEV_Y-4,7,8);
    X.restore();
    // cab cable/counterweight motes
    X.globalAlpha=0.5;X.fillStyle=THEME.accent;
    const mote=(y+4)+((t*20)%(h-8));
    X.fillRect(x+8.5,mote,1.5,3);
    X.globalAlpha=1;
    X.restore();
}

// ====== GOLDEN PHI-RAIN (wealth weather, density scales with net worth) ======
const RAIN=[];
function drawGoldRain(t,tier){

    const target=Math.round(6*Math.pow(PHI,tier));   // ~6 .. ~110
    while(RAIN.length<target){
        RAIN.push({x:Math.random()*W, y:Math.random()*-H,
            v:1.2+Math.random()*2.6, sz:1+Math.random()*2.2,
            sway:Math.random()*TAU, coin:Math.random()<0.35});

    while(RAIN.length>target)RAIN.pop();

    for(const d of RAIN){
        d.y+=d.v; d.sway+=0.04;

// ====== LIVE TRADE TICKER (scrolling marquee) ======
let TICKER_X=0;
function drawTicker(t){
    const ty=H-48, th=13;
    X.fillStyle='#05060c';X.fillRect(0,ty,W,th);
    X.strokeStyle=THEME.accent+'40';X.lineWidth=0.5;
    X.beginPath();X.moveTo(0,ty);X.lineTo(W,ty);X.stroke();
    X.beginPath();X.moveTo(0,ty+th);X.lineTo(W,ty+th);X.stroke();

    // build ticker segments from portfolio + a synthetic tape
    const segs=[];
    (P.stocks||[]).forEach(s=>segs.push({sym:s.name,price:s.price,delta:s.delta}));
    const tape=['φDUEL','RAID','ASCEND','GUILD','SEASON','GOLD','AUREATE','NOVA','PULSAR'];
    tape.forEach((sym,i)=>segs.push({sym:sym,price:100*Math.pow(PHI,(i%4)),delta:Math.sin(t+i)*3}));
    if(!segs.length)return;

    TICKER_X-=1.1; // scroll speed
    const spacing=150;
    const totalW=segs.length*spacing;
    if(TICKER_X<=-totalW)TICKER_X+=totalW;

    X.save();
    X.beginPath();X.rect(0,ty,W,th);X.clip();
    X.font='8px monospace';X.textAlign='left';X.textBaseline='middle';
    // draw two passes so it wraps seamlessly
    for(let pass=0;pass<Math.ceil(W/totalW)+2;pass++){
        for(let i=0;i<segs.length;i++){
            const s=segs[i];
            const x=TICKER_X + pass*totalW + i*spacing + 8;
            if(x>W||x<-spacing)continue;
            const up=s.delta>=0;
            X.fillStyle=THEME.accent;X.fillText(s.sym,x,ty+th/2);
            const symW=s.sym.length*4.8+6;
            X.fillStyle='#aaa';X.fillText('$'+(s.price).toFixed(1),x+symW,ty+th/2);
            X.fillStyle=up?'#00FF8C':'#FF4B4B';
            X.fillText((up?'▲':'▼')+Math.abs(s.delta).toFixed(1)+'%',x+symW+42,ty+th/2);
        }
    }
    X.restore();
    X.textBaseline='alphabetic';
    // "LIVE" badge
    X.fillStyle='#FF4B4B';X.globalAlpha=0.6+0.4*Math.sin(t*4);
    X.beginPath();X.arc(6,ty+th/2,2,0,TAU);X.fill();X.globalAlpha=1;
}

// ====== CORP EMBLEM (phi-fractal logo, seeded by corp index) ======
// Nested phi-scaled polygons rotating by the golden angle; sides & petals
// derive from the corp index so every corp gets a distinct mark.
function drawCorpEmblem(cx,cy,size,t){
    const idx=(CUSTOM.enabled?CUSTOM.emblem:THEME_IDX);
    const sides=3+(idx%5);           // 3..7 sided base
    const petals=5+(idx%4)*2;        // 5,7,9,11 petals
    const golden=2.399963;
    X.save();
    X.translate(cx,cy);
    // soft aura halo
    const halo=X.createRadialGradient(0,0,size*0.2,0,0,size*1.4);
    halo.addColorStop(0,THEME.accent+'22');halo.addColorStop(1,'#00000000');
    X.fillStyle=halo;X.beginPath();X.arc(0,0,size*1.4,0,TAU);X.fill();

    // outer petal ring (golden-angle placement)
    X.globalAlpha=0.5;X.strokeStyle=THEME.aura;X.lineWidth=0.8;
    for(let i=0;i<petals;i++){
        const a=i*golden + t*0.2;
        const px=Math.cos(a)*size*0.95, py=Math.sin(a)*size*0.95;
        X.beginPath();X.arc(px,py,size*0.12,0,TAU);X.stroke();
    }
    // nested rotating phi-polygons
    X.rotate(t*0.25);
    let r=size;
    for(let layer=0;layer<5;layer++){
        X.globalAlpha=0.65-layer*0.1;
        X.strokeStyle=layer%2?THEME.aura:THEME.accent;
        X.lineWidth=1.2-layer*0.15;
        X.beginPath();
        for(let s=0;s<=sides;s++){
            const a=s*TAU/sides + layer*golden;
            const px=Math.cos(a)*r, py=Math.sin(a)*r;
            s===0?X.moveTo(px,py):X.lineTo(px,py);
        }
        X.stroke();
        r/=PHI;   // shrink by golden ratio each layer
        X.rotate(golden*0.5);
    }
    // core gem
    X.globalAlpha=0.9;X.fillStyle=THEME.accent;
    X.shadowColor=THEME.accent;X.shadowBlur=8;
    X.beginPath();X.arc(0,0,size*0.10,0,TAU);X.fill();
    X.restore();
    X.globalAlpha=1;
}

// Background tinted with golden-section guide lines
function drawGoldenBg(t,tc){
    // full-screen faint fractal phi-trees (corners), animated sway
    drawPhiTree(W*0.5, H+8, 60, -Math.PI/2, 9, t, tc);
    drawPhiTree(0, H, 42, -Math.PI/3, 7, t*1.1, '#FFC800');
    drawPhiTree(W, H, 42, -Math.PI*2/3, 7, t*0.9, '#FFC800');

    // golden ratio vertical/horizontal guides
    const gx=W/PHI, gy=H/PHI;
    X.save();
    X.globalAlpha=0.04;X.strokeStyle='#FFC800';X.lineWidth=0.5;
    X.beginPath();X.moveTo(gx,0);X.lineTo(gx,H);X.stroke();
    X.beginPath();X.moveTo(0,gy);X.lineTo(W,gy);X.stroke();
    X.restore();

    // golden-section grid: divide by phi repeatedly
    X.save();
    X.globalAlpha=0.025;X.strokeStyle='#FFC800';X.lineWidth=0.4;
    X.beginPath();
    let x=W/PHI;
    for(let k=0;k<6;k++){x/=PHI;X.moveTo(x,0);X.lineTo(x,H);X.moveTo(W-x,0);X.lineTo(W-x,H);}
    let y=H/PHI;
    for(let k=0;k<6;k++){y/=PHI;X.moveTo(0,y);X.lineTo(W,y);X.moveTo(0,H-y);X.lineTo(W,H-y);}
    X.stroke();
    X.restore();

    // faint golden rectangles in corners
    drawGoldenRect(8, 8, W*0.32, W*0.32/PHI, 5, tc, 0.05);
    drawGoldenRect(W-W*0.32-8, H-W*0.32/PHI-8, W*0.32, W*0.32/PHI, 5, tc, 0.05);

    // radial golden rays from center under phi angles
    const ccx=W/2, ccy=H/2, maxR=Math.hypot(W,H)/2;
    X.save();
    X.globalAlpha=0.03;X.strokeStyle='#FFC800';X.lineWidth=0.4;
    X.beginPath();
    for(let i=0;i<24;i++){
        const a=(i*PHI*TAU)%TAU + t*0.05;
        X.moveTo(ccx,ccy);X.lineTo(ccx+Math.cos(a)*maxR, ccy+Math.sin(a)*maxR);
    }
    X.stroke();
    X.restore();
}

// Multi-layer gradient golden spiral (3 phase-shifted layers)
function drawGoldenSpiralLayered(cx,cy,maxR,turns,t,col){
    for(let L=0;L<3;L++){
        const a=maxR/Math.pow(PHI,turns*2)*(1-L*0.18);
        X.save();
        X.globalAlpha=0.18-L*0.04;
        X.strokeStyle=col;X.lineWidth=1.2-L*0.25;
        X.beginPath();
        const steps=420, phase=L*0.6;
        for(let i=0;i<=steps;i++){
            const th=(i/steps)*turns*TAU + t*0.15 + phase;
            const r=a*Math.pow(PHI, th/(TAU/2));
            if(r>maxR*1.7)break;
            const px=cx+r*Math.cos(th), py=cy+r*Math.sin(th);
            i===0?X.moveTo(px,py):X.lineTo(px,py);
        }
        X.stroke();
        X.restore();
    }
}

function render(){
    const t=frame*0.018;frame++;
    tickTheme();applyCustom();
    // day/night phi-cycle: shift bg brightness + a sky gradient overhead
    const dn=dayNightK(t);   // 0 night .. 1 day
    // corp-themed background, brightened toward "day"
    X.fillStyle=lerpHex(THEME.bg, lerpHex(THEME.bg, THEME.accent, 0.14), dn);
    X.fillRect(0,0,W,H);
    // sky gradient: cool/dark at night, warm accent glow by day (top-down)
    const sky=X.createLinearGradient(0,0,0,H);
    sky.addColorStop(0, THEME.accent + (dn>0.5?'22':'0c'));
    sky.addColorStop(0.5,'#00000000');
    sky.addColorStop(1, dn<0.4?'#0006':'#00000000');
    X.fillStyle=sky;X.fillRect(0,0,W,H);
    // drifting stars at night / faint sun-motes by day
    X.save();
    const motes=40;
    for(let i=0;i<motes;i++){
        const mx=(i*137.5 + t*(6+ (i%5)))%W;
        const my=(i*61.8)%(H*0.55);
        const tw=0.5+0.5*Math.sin(t*2+i);
        X.globalAlpha=(dn<0.5? (1-dn*1.6)*tw*0.6 : dn*tw*0.25);
        X.fillStyle=dn<0.5?'#cfe0ff':THEME.accent;
        X.beginPath();X.arc(mx,my,dn<0.5?0.8:1.1,0,TAU);X.fill();
    }
    X.restore();X.globalAlpha=1;
    // centered vignette
    const vg=X.createRadialGradient(W/2,H/2,60,W/2,H/2,Math.max(W,H)*0.75);
    vg.addColorStop(0,THEME.accent+(dn>0.5?'18':'10'));vg.addColorStop(1,'#00000000');
    X.fillStyle=vg;X.fillRect(0,0,W,H);
    // sun/moon marker riding a phi-arc across the top
    const cyc=(t/PHI/6)%TAU;
    const smx=W*0.5 + Math.cos(cyc-Math.PI/2)*W*0.42;
    const smy=H*0.30 - Math.sin(cyc-Math.PI/2)*H*0.20;
    X.save();X.globalAlpha=0.5;
    if(dn>0.5){X.fillStyle='#FFDA6B';X.shadowColor='#FFDA6B';X.shadowBlur=18;X.beginPath();X.arc(smx,smy,7,0,TAU);X.fill();}
    else{X.fillStyle='#cfe0ff';X.shadowColor='#8fb0ff';X.shadowBlur=10;X.beginPath();X.arc(smx,smy,5,0,TAU);X.fill();
         X.globalCompositeOperation='destination-out';X.beginPath();X.arc(smx+2.5,smy-2,5,0,TAU);X.fill();X.globalCompositeOperation='source-over';}
    X.restore();X.globalAlpha=1;

    const nw=P.netWorth;const tier=Math.min(5,Math.floor(Math.log10(Math.max(1,nw))/1.5));
    checkPromotion(tier);
    // accent = corp theme; keep tier color available for rarity-driven bits
    const tc=THEME.accent;

    // === GOLDEN SECTION BACKGROUND ===
    drawGoldenBg(t,tc);

    // === GOLDEN PHI-RAIN (wealth weather) ===
    drawGoldRain(t,tier);

    // === PRESTIGE AURA (ranked rings framing the card) ===
    drawPrestigeAura(t);

    // === FLOATING CORP EMBLEM (phi-fractal logo, top-left) ===
    const emY=42 + Math.sin(t*0.9)*4;   // gentle float
    drawCorpEmblem(42, emY, 24, t);
    X.fillStyle=THEME.accent;X.font='7px monospace';X.textAlign='center';
    X.globalAlpha=0.8;X.fillText(THEME.name,42,emY+34);X.globalAlpha=1;

    // === LEFT: true golden spiral (layered) ===
    drawGoldenSpiralLayered(90, 250, Math.min(W,H)*0.38, 3.2, t, tc);

    // === CORP FLOORS MINI-MAP (left edge, phi-elevator) ===
    drawFloorMap(6, 66, 62, 176, t);

    // === QR CODE (scan to open live card) ===
    drawQR(9, 250, 52, t);

    // === BADGE SHELF (unlocked achievements) ===
    drawBadges(75, 260, t);

    // === CENTER: stocks as waves ===
    const sx=170,sy=50,sw=350,sh=200;
    X.strokeStyle='#1a1a2e';X.lineWidth=0.5;X.strokeRect(sx,sy,sw,sh);
    X.fillStyle='#555';X.font='8px monospace';X.textAlign='center';X.fillText('PORTFOLIO — '+P.stocks.length+' stocks',sx+sw/2,sy-4);

    P.stocks.forEach((st,idx)=>{
        const yB=sy+15+idx*(sh-20)/Math.max(1,P.stocks.length);
        const amp=2.5+Math.abs(st.delta)*1.5;const freq=8+st.held/25;
        const col=st.delta>=0?'#00FF8C':'#FF3232';
        X.beginPath();
        for(let i=0;i<=sw;i+=3){const f=i/sw;const w=Math.sin(f*freq+t+idx*0.7)*amp*(1-Math.abs(f-0.5)*2);i===0?X.moveTo(sx+i,yB+w):X.lineTo(sx+i,yB+w);}
        X.strokeStyle=col;X.globalAlpha=0.55;X.lineWidth=1.2;X.stroke();X.globalAlpha=1;
        X.fillStyle='#444';X.font='7px monospace';X.textAlign='left';X.fillText(st.name,sx+3,yB-3);
        X.fillStyle=col;X.textAlign='right';X.fillText('$'+st.price.toFixed(1),sx+sw-3,yB-3);
    });

    // === LIVE STOCK MINI-CHART (top holding, rolling candles) ===
    drawStockChart(170, 256, 350, 20, t);

    // === RIGHT: loot items rendered ===
    const lx=540,ly=50,lw=245,lh=200;
    X.strokeStyle='#1a1a2e';X.lineWidth=0.5;X.strokeRect(lx,ly,lw,lh);
    X.fillStyle='#555';X.font='8px monospace';X.textAlign='center';X.fillText('LOOT — '+P.loot.length+' items',lx+lw/2,ly-4);

    const maxShow=Math.min(P.loot.length,12);
    const cellW=48,cellH=48;
    const cols=Math.floor(lw/cellW);
    for(let i=0;i<maxShow;i++){
        const col2=i%cols,row=Math.floor(i/cols);
        const cx=lx+8+col2*cellW+cellW/2;
        const cy=ly+8+row*cellH+cellH/2;
        const l=P.loot[i];
        const rarityColor=RCOL[l.rarity];
        const isMaint=((l.code*7+13)%100)<5;

        // cell bg + glow border in one stroke
        X.fillStyle=isMaint?'#111':rarityColor+'08';
        X.fillRect(cx-cellW/2+2,cy-cellH/2+2,cellW-4,cellH-4);
        X.strokeStyle=isMaint?'#33333340':rarityColor+'60';X.lineWidth=0.5;
        X.strokeRect(cx-cellW/2+2,cy-cellW/2+2,cellW-4,cellH-4);

        if(isMaint){
            X.fillStyle='#333';X.font='8px monospace';X.textAlign='center';
            X.fillText('MAINT.',cx,cy+2);
        }else if(l.cat===10){
            const {fn}=getRenderer(l.code);
            X.save();
            X.beginPath();X.rect(cx-cellW/2+2,cy-cellH/2+2,cellW-4,cellH-4);X.clip();
            fn(X,cx,cy-2,cellW*0.42,l.code,l.rarity,l.phi_seed);
            X.restore();
        }else{
            const {fn}=getRenderer(l.code);
            X.save();
            X.beginPath();X.rect(cx-cellW/2+2,cy-cellH/2+2,cellW-4,cellH-4);X.clip();
            fn(X,cx,cy-2,cellW*0.42,l.code,l.rarity);
            X.restore();
        }

        // qty
        if(l.qty>1){X.fillStyle=rarityColor;X.font='bold 7px monospace';X.textAlign='right';X.fillText('x'+l.qty,cx+cellW/2-4,cy+cellH/2-4);}
    }
    if(P.loot.length>maxShow){X.fillStyle='#555';X.font='7px monospace';X.textAlign='center';X.fillText('+'+(P.loot.length-maxShow)+' more',lx+lw/2,ly+lh-4);}

    // disclaimer
    X.fillStyle='#222';X.font='6px monospace';X.textAlign='center';
    X.fillText('Loot icons are symbols of ownership, not property of CORP HEIST.',lx+lw/2,ly+lh-14);

    // === BOTTOM: stats bar ===
    const by=280,bh=210;
    X.fillStyle='#0d0d18';X.fillRect(0,by,W,bh);X.strokeStyle='#1a1a2e';X.lineWidth=1;X.beginPath();X.moveTo(0,by);X.lineTo(W,by);X.stroke();

    // net worth mini spiral
    X.globalAlpha=0.25;X.beginPath();for(let i=0;i<100;i++){const a=i*0.15+t*0.4;const r=22*Math.pow(PHI,i/40-3);if(r>22)break;i===0?X.moveTo(60+r*Math.cos(a),by+40+r*Math.sin(a)):X.lineTo(60+r*Math.cos(a),by+40+r*Math.sin(a));}X.strokeStyle='#FFC800';X.lineWidth=1;X.stroke();X.globalAlpha=1;

    X.fillStyle='#FFC800';X.font='8px monospace';X.textAlign='left';X.fillText('NET WORTH',20,by+14);
    X.save();X.shadowColor='#FFC800';X.shadowBlur=8+3*Math.sin(t*2);
    X.font='bold 18px monospace';X.fillText('$'+fmt(P.netWorth),20,by+36);X.restore();
    X.fillStyle='#555';X.font='8px monospace';X.fillText('RANK #'+P.rank+' | '+P.corp,20,by+50);

    // gold
    X.fillStyle='#FFD700';X.font='8px monospace';X.fillText('GOLD',200,by+14);
    X.save();X.shadowColor='#FFD700';X.shadowBlur=6+2*Math.sin(t*2.4);
    X.font='bold 14px monospace';X.fillText('$'+fmt(P.gold),200,by+34);X.restore();
    X.fillStyle='#555';X.font='8px monospace';X.fillText('LVL '+P.level+' | PRESTIGE '+P.prestige,200,by+50);
    X.fillText('STREAK '+P.streak+'d',200,by+64);

    // loot summary
    X.fillStyle=tc;X.font='8px monospace';X.fillText('LOOT VALUE',380,by+14);
    let lv=0;P.loot.forEach(l=>{lv+=l.value*l.qty;});
    X.font='bold 14px monospace';X.fillText('$'+fmt(lv),380,by+34);
    X.fillStyle='#555';X.font='8px monospace';
    const rarCounts=[0,0,0,0,0,0];P.loot.forEach(l=>{rarCounts[l.rarity]++;});
    rarCounts.forEach((c,i)=>{if(c>0)X.fillText(RNAMES[i]+':'+c,380,by+50+i*12);});

    // history chart
    const hx=540,hy=by+12,hw=240,hh=65;
    X.strokeStyle='#1a1a2e';X.lineWidth=0.5;X.strokeRect(hx,hy,hw,hh);
    const hist=P.history;if(hist.length>1){
        const mn=Math.min(...hist)*0.9,mx=Math.max(...hist)*1.1,rng=mx-mn||1;
        X.beginPath();hist.forEach((v,i)=>{const px=hx+i*(hw/hist.length),py=hy+hh-5-((v-mn)/rng)*hh;i===0?X.moveTo(px,py):X.lineTo(px,py);});X.strokeStyle=tc;X.lineWidth=1.3;X.stroke();
        X.lineTo(hx+hw,hy+hh-5);X.lineTo(hx,hy+hh-5);X.closePath();X.fillStyle=tc+'12';X.fill();
    }
    X.fillStyle='#555';X.font='7px monospace';X.textAlign='left';X.fillText('WEALTH GROWTH',hx+3,hy+10);
    X.fillStyle=tc;X.textAlign='right';X.fillText(P.name+' ('+RNAMES[tier]+')',hx+hw-3,hy+10);

    // welfare candle quotes (standard-of-living, from the cube)
    drawWelfare(hx,hy+hh+10,hw,58,tc);

    // chain visualization (loot flow)
    X.fillStyle='#333';X.font='7px monospace';X.textAlign='left';
    X.fillText('LOOT CHAIN FLOW',20,by+100);
    // animated loot chain flowing along a golden spiral into GOLD
    const chainY=by+115;
    const ccx=120, ccy=chainY;
    const cnames=['MarketMaker','Broker','Forge','Auction','Arbitrage','DarkPool','DataMiner','InsureFund'];
    const nFlow=Math.min(6,P.loot.length);
    // spiral guide
    X.save();X.globalAlpha=0.12;X.strokeStyle='#FFC800';X.lineWidth=0.5;X.beginPath();
    for(let i=0;i<=160;i++){const a=i*0.12;const r=Math.min(90,2.2*Math.pow(PHI,i/22));const px=ccx+r*Math.cos(a),py=ccy+r*Math.sin(a);i===0?X.moveTo(px,py):X.lineTo(px,py);}
    X.stroke();X.restore();
    for(let i=0;i<nFlow;i++){
        const l=P.loot[i];
        const {cat}=getRenderer(l.code);
        const phase=(t*0.6 + i*TAU/nFlow)%TAU;
        const a=phase;const r=Math.min(90,2.2*Math.pow(PHI,(a/TAU)*22));
        const px=ccx+r*Math.cos(a), py=ccy+r*Math.sin(a);
        // travelling dot = loot item
        X.globalAlpha=0.9;X.fillStyle=RCOL[l.rarity];
        X.beginPath();X.arc(px,py,2.2,0,TAU);X.fill();
        // trail to gold sink
        X.globalAlpha=0.25;X.strokeStyle=RCOL[l.rarity];X.lineWidth=0.5;
        X.beginPath();X.moveTo(px,py);X.lineTo(ccx+95,ccy);X.stroke();
        X.globalAlpha=1;
        // label when near sink
        if(r>80){X.fillStyle=RCOL[l.rarity];X.font='6px monospace';X.fillText(cat.substr(0,7),px-12,py-4);}
    }
    X.fillStyle='#FFC800';X.font='7px monospace';X.textAlign='left';
    X.fillText('GOLD SINK',ccx+98,ccy-2);
    X.fillStyle='#555';X.font='6px monospace';
    X.fillText('loot → '+cnames[frame%cnames.length]+' → gold (phi-flow)',20,chainY+18);

    // === GUILD RAID TITAN (bottom-right of stats bar) ===
    if(RAIDVIZ.loaded){
        const tX=690, tY=by+150, tSz=42;
        drawTitan(tX,tY,tSz,t);
        drawHitParticles(tX,tY);
        // label + hp bar
        X.fillStyle=RAIDVIZ.defeated?'#555':'#FF4B4B';X.font='7px monospace';X.textAlign='center';
        X.fillText(RAIDVIZ.name||'RAID BOSS',tX,by+95);
        drawHpBar(tX-58,by+100,116,7,RAIDVIZ.pct,t);
        X.fillStyle='#888';X.font='6px monospace';
        X.fillText(RAIDVIZ.defeated?'** DEFEATED **':'HP '+fmt(RAIDVIZ.hp)+' / '+fmt(RAIDVIZ.max),tX,by+116);
        X.fillStyle='#444';X.fillText('φ-fractal Titan · corp coop',tX,by+200);
    }

    // === LIVE TRADE TICKER (scrolling marquee above footer) ===
    drawTicker(t);

    // footer + disclaimer
    X.fillStyle='#1a1a2e';X.fillRect(0,H-35,W,35);
    X.fillStyle='#333';X.font='5.5px monospace';X.textAlign='center';
    X.fillText('Loot icons are personal symbols of ownership. CORP HEIST makes no claims over displayed items.',W/2,H-26);
    X.fillText('Items may be temporarily unavailable for maintenance, cleaning, or recalibration.',W/2,H-18);
    X.fillText('Donations are voluntary benefactions (no real-money return). Operator remits taxes. 14/39/152/149-ФЗ. Age 12+',W/2,H-10);
    X.fillStyle='#222';X.font='7px monospace';
    X.fillText('CORP HEIST | Binary Protocol v2 | '+TOTAL+' render algorithms | Player->Char->System',W/2,H-3);

    // === MONEY WATERFALL (panel-open transition) ===
    drawWaterfall();

    // === PHI-FIREWORKS (tier / floor promotion celebration) ===
    drawFireworks(t);

    // === VICTORY OVERLAY (full-screen phi loot-burst) ===
    drawVictory();

    // === ASCEND rank-up aura explosion ===
    drawAscend();

    // === SEASON FINALE (full-screen podium) ===
    drawFinale();

    // === 3D TOWER TOUR (full-screen elevator ride) ===
    drawTour();

    // === PVP DUEL REPLAY (full-screen two-fighter animation) ===
    drawDuel();

    // === PHI TOURNAMENT (full-screen 8-fighter bracket) ===
    drawTourney();

    // === DAILY GOLDEN CHEST (full-screen) ===
    drawChest();

    // === WORLD BOSS (full-screen shared HP) ===
    drawWorldBoss();

    // === WORLD MAP (full-screen corp skyline) ===
    drawWorldMap();

    if(!paused)requestAnimationFrame(render);
}

// Welfare report -> standalone high-res PNG (client-side, zero deps, prints itself).
// Renders to an offscreen canvas so nothing touches the live render loop or the main canvas.

    scale=scale||2;
    const MC=window.MarketCube;
    const W=520,H=340;
    const cv=document.createElement('canvas');cv.width=W*scale;cv.height=H*scale;
    const g=cv.getContext('2d');g.scale(scale,scale);
    // background
    g.fillStyle='#05060d';g.fillRect(0,0,W,H);
    g.strokeStyle='#FFC800';g.lineWidth=1;g.strokeRect(4,4,W-8,H-8);
    // header
    g.fillStyle='#FFC800';g.font='bold 15px monospace';g.textAlign='left';
    g.fillText('CORP HEIST \u2014 \u0411\u041b\u0410\u0413\u041e\u041f\u041e\u041b\u0423\u0427\u0418\u0415',16,28);
    g.fillStyle='#888';g.font='9px monospace';
    g.fillText('\u0423\u0420\u041e\u0412\u0415\u041d\u042c \u0416\u0418\u0417\u041d\u0418 \u00b7 '+(P.name||('#'+(P.uid||0))),16,42);
    if(!MC||P.uid==null){
        g.fillStyle='#666';g.font='11px monospace';g.textAlign='center';
        g.fillText('cube unavailable',W/2,H/2);
    } else {
        let q,ex;try{const now=Math.floor(Date.now()/1000);q=MC.welfareQuotes(P.uid|0,now,8);ex=MC.welfareExplain(P.uid|0,now);}catch(e){q=null;}
        if(q&&q.length){
            const cx0=16,cy0=58,cw0=W-32,ch0=200;
            let lo=Infinity,hi=-Infinity;q.forEach(c=>{if(c.l<lo)lo=c.l;if(c.h>hi)hi=c.h;});
            const fl=q[q.length-1].floor;if(fl<lo)lo=fl;lo*=0.98;hi*=1.02;const rng=hi-lo||1;
            const slot=cw0/q.length,bw=Math.max(4,slot*0.5);
            const yOf=v=>cy0+ch0-((v-lo)/rng)*ch0;
            // phi guides
            g.strokeStyle='#161826';g.lineWidth=0.5;
            [0.382,0.618].forEach(fr=>{const gy=cy0+ch0*fr;g.beginPath();g.moveTo(cx0,gy);g.lineTo(cx0+cw0,gy);g.stroke();});
            // floor line
            g.strokeStyle='#664400';g.setLineDash([3,3]);
            g.beginPath();g.moveTo(cx0,yOf(fl));g.lineTo(cx0+cw0,yOf(fl));g.stroke();g.setLineDash([]);
            // candles
            q.forEach((c,i)=>{
                const cx=cx0+i*slot+slot/2;const up=c.c>=c.o;const col=up?'#38d66a':'#ff4b4b';
                g.strokeStyle=col;g.lineWidth=1.2;
                g.beginPath();g.moveTo(cx,yOf(c.h));g.lineTo(cx,yOf(c.l));g.stroke();
                const oy=yOf(c.o),cy=yOf(c.c),bt=Math.min(oy,cy),bb=Math.max(oy,cy);
                g.fillStyle=col;g.fillRect(cx-bw/2,bt,bw,Math.max(1.5,bb-bt));
            });
            // saldo + tier
            const saldo=q[q.length-1].c-q[0].o;const up=saldo>=0;
            g.font='11px monospace';g.textAlign='left';
            g.fillStyle='#FFC800';g.fillText('\u043a\u043b\u0430\u0441\u0441 \u0436\u0438\u0437\u043d\u0438 '+ex.living_tier,16,H-46);
            g.fillStyle=up?'#38d66a':'#ff4b4b';
            g.fillText('\u0441\u0430\u043b\u044c\u0434\u043e 8\u043d\u0435\u0434: '+(up?'+':'\u2212')+'$'+fmt(Math.abs(saldo)),16,H-32);
            g.textAlign='right';g.fillStyle='#888';
            g.fillText('floor $'+fmt(fl)+'   welfare $'+fmt(ex.welfare),W-16,H-46);
        } else {
            g.fillStyle='#666';g.font='11px monospace';g.textAlign='center';g.fillText('no data',W/2,H/2);
        }
    }
    // compliance footer
    g.fillStyle='#555';g.font='8px monospace';g.textAlign='center';
    g.fillText('\u0412\u043d\u0443\u0442\u0440\u0438\u0438\u0433\u0440\u043e\u0432\u0430\u044f \u043c\u0435\u0442\u0440\u0438\u043a\u0430 \u0443\u0440\u043e\u0432\u043d\u044f \u0436\u0438\u0437\u043d\u0438. \u041d\u0435 \u0440\u0435\u0430\u043b\u044c\u043d\u044b\u0435 \u0434\u0435\u043d\u044c\u0433\u0438. \u0414\u0435\u0442\u0435\u0440\u043c\u0438\u043d\u0438\u0440\u043e\u0432\u0430\u043d\u043e \u043e\u0442 \u043a\u0443\u0431\u0430.',W/2,H-14);
    const a=document.createElement('a');
    a.download='corp-heist-welfare-'+(P.name||('uid'+(P.uid||0)))+'-'+Date.now()+'.png';
    a.href=cv.toDataURL('image/png');document.body.appendChild(a);a.click();a.remove();
    try{SND.click();}catch(e){}

// donate: system decides budget, everything obtainable for something (14-ФЗ compliant)
function donateLoot(){
    if(!P.loot.length)return;
    let ri=0;P.loot.forEach((l,i)=>{if(l.rarity>P.loot[ri].rarity)ri=i;});
    const l=P.loot[ri];
    // system budget: gold multiplier by rarity (system decides, rates published)
    const sysMult=[3,5,8,12,20,50][l.rarity];
    const goldBonus=l.value*l.qty*sysMult;
    P.gold+=goldBonus;P.netWorth+=goldBonus;
    P.loot.splice(ri,1);
    if(P.history.length)P.history.push(P.history[P.history.length-1]+goldBonus*0.5);
}

// morphing panel core: set themed border, morph-in, auto-dismiss
function _applyPanel(html,ttl){
    const el=document.getElementById('overlay');
    el.style.borderColor=THEME.accent;el.style.color=THEME.accent;
    triggerWaterfall();
    const paint=()=>{
        el.innerHTML=html;
        el.style.display='block';
        el.classList.remove('show');
        // force reflow so the morph transition replays
        void el.offsetWidth;
        requestAnimationFrame(()=>el.classList.add('show'));
        clearTimeout(el._t);
        if(ttl)el._t=setTimeout(hideOverlay,ttl);
    };
    if(el.classList.contains('show')){
        // morph out old panel, then morph in new (panel-to-panel transition)
        el.classList.remove('show');
        clearTimeout(el._t);
        setTimeout(paint,180);
    }else paint();
}

function drawCandles(cv,candles){
    const X=cv.getContext('2d');const W=cv.width,H=cv.height;X.clearRect(0,0,W,H);
    if(!candles||!candles.length)return;
    let lo=Infinity,hi=-Infinity;for(const c of candles){lo=Math.min(lo,c.l);hi=Math.max(hi,c.h);}
    if(hi<=lo)hi=lo+1;const pad=6;
    const y=v=>H-pad-(v-lo)/(hi-lo)*(H-2*pad);
    const n=candles.length;const cw=Math.max(2,(W-2*pad)/n);
    candles.forEach((c,i)=>{
        const cx=pad+i*cw+cw/2;const up=c.c>=c.o;const col=up?'#00FF8C':'#FF3B3B';
        X.strokeStyle=col;X.beginPath();X.moveTo(cx,y(c.h));X.lineTo(cx,y(c.l));X.stroke();
        X.fillStyle=col;const yo=y(c.o),yc=y(c.c);
        X.fillRect(cx-cw*0.32,Math.min(yo,yc),Math.max(1,cw*0.64),Math.max(1,Math.abs(yc-yo)));
    });
}

// ---- PRESS: PHI micro-magazines (PDF) ----
// ===== PHI PRESS — web edition on canvas (no PDF; print + PNG in-browser) =====
// Each cover is a deterministic vector "hero scene" drawn straight onto a
// <canvas> (the JS twins of press/hero_scenes.py). Readers Print or save PNG;
// the print-grade PDF stays an offline/CI artifact only.
const PressScenes=(function(){
    const GOLD='#FFC800',GOLD_LT='#FFE24B',AMBER='#FFB020',GREEN='#00FF8C',
          RED='#FF3B3B',CYAN='#00E5FF',PURPLE='#B14BFF',GREY='#9696A8',
          WHITE='#E6E8F0',INK='#0A0B16',PANEL2='#16182C';
    const PHI=1.618033988749,INV=0.6180339887,TAU=Math.PI*2;
    function rng(seed){let s=(seed*2654435761+1013904223)>>>0;return function(){s=(1103515245*s+12345)&0x7FFFFFFF;return s/0x7FFFFFFF;};}
    function frame(g,x,y,w,h,border){
        const grad=g.createLinearGradient(0,y,0,y+h);grad.addColorStop(0,INK);grad.addColorStop(1,PANEL2);
        g.fillStyle=grad;g.fillRect(x,y,w,h);
        g.strokeStyle=border||GOLD;g.lineWidth=1.2;g.strokeRect(x+0.5,y+0.5,w-1,h-1);

    function stars(g,x,y,w,h,seed,n){const r=rng(seed);g.globalAlpha=0.5;g.fillStyle=WHITE;for(let i=0;i<(n||40);i++){g.beginPath();g.arc(x+r()*w,y+r()*h,0.4+r()*1.0,0,TAU);g.fill();}g.globalAlpha=1;}

// ---- MARKET SECTORS (phi-sectors + rotation) ----
function miniSpark(vals,col){
    if(!vals||vals.length<2)return '';
    let lo=Math.min(...vals),hi=Math.max(...vals);if(hi<=lo)hi=lo+1;
    const W=60,H=16;let pts='';
    vals.forEach((v,i)=>{const x=i/(vals.length-1)*W;const y=H-(v-lo)/(hi-lo)*H;pts+=(i?' ':'')+x.toFixed(1)+','+y.toFixed(1);});
    return '<svg width="'+W+'" height="'+H+'"><polyline points="'+pts+'" fill="none" stroke="'+col+'" stroke-width="1.2"/></svg>';
}

    try{

                   '<div><span style="color:#FFE24B">'+s.emoji+' '+s.name+'</span> <span style="color:'+col+';font-size:9px">'+(s.change>=0?'▲':'▼')+Math.abs(s.change_pct)+'%</span>'+
                   '<div style="color:#555;font-size:7px">'+s.members.map(m=>m.name).join(' ')+'</div></div>'+

            h+='<div style="color:#555;font-size:8px;margin-top:4px">'+d.note+'</div>';
            p.innerHTML=h;
        };
        paint();
    }catch(e){showOverlay('Sectors','offline');}
}

        openPanel('<b>🎯 GOLDEN-500 OPTIONS</b><div id="io-body" style="color:#555">loading...</div>',26000);
        const paint=async()=>{
            const p=document.getElementById('io-body');if(!p)return;
            const [ch,st]=await Promise.all([
                fetch(API+'/api/idxopt').then(r=>r.json()),
                fetch(API+'/api/idxopt?uid='+_uid()).then(r=>r.json())
            ]);
            let h='<div style="text-align:center;color:#FFC800;font-size:11px">index '+ch.spot+'</div>';
            h+='<table style="width:100%;font-size:9px;font-family:monospace"><tr style="color:#555"><td>CALL</td><td style="text-align:center">STRIKE</td><td style="text-align:right">PUT</td></tr>';
            for(const s of ch.strikes){
                h+='<tr><td><button onclick="openIdxOpt(\'call\','+s.strike+')" style="border:1px solid #00FF8C;color:#00FF8C;background:#0a1a10;font-size:9px;padding:1px 4px;cursor:pointer">C '+fmt(s.call_premium)+'</button></td>'+
                   '<td style="text-align:center;color:#FFE24B">'+s.strike+'</td>'+
                   '<td style="text-align:right"><button onclick="openIdxOpt(\'put\','+s.strike+')" style="border:1px solid #FF6B6B;color:#FF6B6B;background:#1a0a0a;font-size:9px;padding:1px 4px;cursor:pointer">P '+fmt(s.put_premium)+'</button></td></tr>';
            }
            h+='</table><div style="color:#555;font-size:8px;margin:4px 0">'+ch.note+'</div>';
            if((st.positions||[]).length){
                h+='<div style="color:#00E5FF;font-size:9px;border-top:1px solid #222;padding-top:3px">YOUR OPTIONS</div><table style="width:100%;font-size:9px;font-family:monospace">';
                for(const q of st.positions){
                    const c=q.in_money?'#00FF8C':'#888';const ready=q.expires_in<=0;
                    h+='<tr><td style="color:'+c+'">'+q.kind.toUpperCase()+' @'+q.strike+'<div style="color:#555;font-size:7px">est '+fmt(q.est_payout)+'g</div></td>'+
                       '<td style="text-align:right">'+(ready?'<button onclick="settleIdxOpt('+q.id+')" style="border:1px solid #FFC800;color:#FFC800;background:#181400;font-size:9px;padding:1px 5px;cursor:pointer">SETTLE</button>':'<span style="color:#555">'+q.expires_in+'s</span>')+'</td></tr>';
                }
                h+='</table>';
            }
            p.innerHTML=h;
        };
        paint();
    }catch(e){showOverlay('500-Options','offline');}
}
async function openIdxOpt(kind,strike){
    try{
        const r=await fetch(API+'/pulse/idxopt/open',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({uid:_uid(),kind:kind,strike:strike})});
        const d=await r.json();
        if(d.error){showOverlay('🎯 OPTION',d.error+(d.premium?(' (premium '+fmt(d.premium)+'g)'):''));return;}
        SND.click();showOverlay('🎯 '+d.kind.toUpperCase(),'strike '+d.strike+'\npremium '+fmt(d.premium)+'g\nexpires in '+d.expires_in+'s');
        showIdxOpt();loadPlayer(_uid());
    }catch(e){}
}
async function settleIdxOpt(id){
    try{
        const r=await fetch(API+'/pulse/idxopt/settle',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({uid:_uid(),id:id})});
        const d=await r.json();
        if(d.error){showOverlay('🎯 SETTLE',d.error+(d.expires_in?(' ('+d.expires_in+'s left)'):''));return;}
        SND.promo();showOverlay('🎯 SETTLED',d.kind.toUpperCase()+' @'+d.strike+'\nindex '+d.spot+'\npayout '+fmt(d.payout)+'g'+(d.golden?'\n⚡ GOLDEN HOUR':''));
        showIdxOpt();loadPlayer(_uid());
    }catch(e){}
}

async function showMM(){

                '<button onclick="placeMM()" style="border:1px solid #00FF8C;color:#00FF8C;background:#0a1a10;font-size:10px;padding:2px 6px;cursor:pointer">POST</button>'+
                '<div style="color:#555;font-size:7px;margin-top:2px">buy at bid, auto-sell at bid×φ ('+st.spread+'×) · lev up to '+st.max_leverage+'× (crash=margin call)</div></div>';
            h+='<table style="width:100%;font-size:9px;font-family:monospace">';
            for(const o of (st.orders||[])){
                const sc=o.danger?'#FF3B3B':(o.state==='filled'?'#FFC800':'#00FF8C');
                const lev=(o.leverage&&o.leverage>1)?(' · '+o.leverage+'× debt '+fmt(o.debt||0)):'';
                h+='<tr style="border-top:1px solid #1a1a2e'+(o.danger?';background:#2a0a0a':'')+'"><td style="color:'+sc+'">'+o.symbol+' ×'+o.size+(o.danger?' ⚠':'')+'<div style="color:#555;font-size:7px">'+o.state+' · spot '+o.spot+lev+'</div></td>'+

            }
            h+='</table><div style="color:#555;font-size:8px;margin-top:4px">'+st.note+'</div>';
            p.innerHTML=h;
        };
        paint();
    }catch(e){showOverlay('Market Making','offline');}

async function placeMM(){
    const sym=(document.getElementById('mm-sym')||{}).value;
    const sel=document.getElementById('mm-sym');
    let bid=parseFloat((document.getElementById('mm-bid')||{}).value||'0');
    if(!bid&&sel){const o=sel.options[sel.selectedIndex];bid=Math.round(parseFloat(o.getAttribute('data-p'))/PHI*100)/100;}
    const size=parseInt((document.getElementById('mm-size')||{}).value||'10',10);
    const lev=parseFloat((document.getElementById('mm-lev')||{}).value||'1');
    try{
        const r=await fetch(API+'/pulse/mm/place',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({uid:_uid(),symbol:sym,bid:bid,size:size,leverage:lev})});
        const d=await r.json();
        if(d.error){showOverlay('⚖ MM',d.error+(d.need?(' (need '+fmt(d.need)+'g)'):''));return;}
        SND.click();showOverlay('⚖ POSTED',d.symbol+' ×'+d.size+' @'+d.leverage+'×\nbid '+d.bid+' → ask '+d.ask+'\nequity '+fmt(d.equity)+'g'+(d.debt?(' + debt '+fmt(d.debt)+'g'):''));
        showMM();loadPlayer(_uid());
    }catch(e){}
}
async function cancelMM(id){
    try{
        const r=await fetch(API+'/pulse/mm/cancel',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({uid:_uid(),id:id})});
        const d=await r.json();
        if(d.error){showOverlay('⚖ CANCEL',d.error);return;}
        SND.click();showOverlay('⚖ CANCELLED','refund '+fmt(d.refund)+'g');
        showMM();loadPlayer(_uid());
    }catch(e){}
}

let _liqSeen=0,_liqInit=false;
async function pollLiquidations(){
    try{
        const r=await fetch(API+'/api/liqfeed?since='+_liqSeen);const d=await r.json();
        if(!_liqInit){_liqSeen=d.last_id;_liqInit=true;return;}
        for(const ev of (d.events||[])){
            _liqSeen=Math.max(_liqSeen,ev.id);
            if(ev.type==='liquidated')liquidationOverlay(ev,'LIQUIDATED','seized');
            else if(ev.type==='squeezed')liquidationOverlay(ev,'SQUEEZED','margin wiped');
            else if(ev.type==='mm_liquidated')liquidationOverlay(ev,'MARGIN CALL','equity wiped');
            else if(ev.type==='flashcrash')flashCrashOverlay(ev);
            else flashToast('🛡 '+ev.text,'#00FF8C');
        }
    }catch(e){}
}
setInterval(pollLiquidations,5000);setTimeout(pollLiquidations,1500);

let _tapeSeen=0;const _tapeLines=[];
const TAPE_COL={bot:'#FFC800',crash:'#FF3B3B',badge:'#00FF8C'};
async function pollTape(){
    try{
        const d=await fetch(API+'/api/tape?since='+_tapeSeen).then(r=>r.json());
        for(const l of (d.lines||[])){_tapeSeen=Math.max(_tapeSeen,l.id);_tapeLines.push(l);}
        while(_tapeLines.length>30)_tapeLines.shift();
        const el=document.getElementById('tape-scroll');
        if(el&&_tapeLines.length){
            el.innerHTML=_tapeLines.map(l=>'<span style="color:'+(TAPE_COL[l.kind]||'#FFC800')+';margin-right:32px">'+(l.kind==='crash'?'💥 ':l.kind==='badge'?'🏅 ':'▸ ')+l.text+'</span>').join('');
        }
    }catch(e){}
}

function flashToast(text,col){
    const t=document.createElement('div');
    t.style.cssText='position:fixed;left:50%;top:14%;transform:translateX(-50%);z-index:10000;background:#0d0d18;border:1px solid '+col+';color:'+col+';font-family:monospace;font-size:11px;padding:6px 12px;border-radius:4px;box-shadow:0 0 16px '+col;
    t.textContent=text;document.body.appendChild(t);
    setTimeout(()=>{t.style.transition='opacity .6s';t.style.opacity='0';setTimeout(()=>t.remove(),600);},3200);
}
function liquidationOverlay(ev,title,verb){
    title=title||'LIQUIDATED';verb=verb||'seized';
    SND.duelHit&&SND.duelHit();
    const cv=document.createElement('canvas');
    cv.width=window.innerWidth;cv.height=window.innerHeight;
    cv.style.cssText='position:fixed;left:0;top:0;z-index:10001;pointer-events:none';
    document.body.appendChild(cv);
    const X=cv.getContext('2d');const W=cv.width,H=cv.height;
    const mine=(String(ev.uid)===String(_uid()));
    let t=0;const shards=[];
    for(let i=0;i<80;i++)shards.push({x:W/2,y:H/2,a:Math.random()*TAU,v:2+Math.random()*10,r:2+Math.random()*5});
    const anim=()=>{
        t++;X.clearRect(0,0,W,H);
        X.fillStyle='rgba(255,0,0,'+(0.25*Math.max(0,1-t/60))+')';X.fillRect(0,0,W,H);
        for(const s of shards){s.x+=Math.cos(s.a)*s.v;s.y+=Math.sin(s.a)*s.v+t*0.15;X.fillStyle='#FF3B3B';X.fillRect(s.x,s.y,s.r,s.r);}
        X.save();X.textAlign='center';
        const sc=Math.min(1,t/12);X.font='bold '+Math.round(46*sc)+'px monospace';
        X.fillStyle='#FF3B3B';X.shadowColor='#FF3B3B';X.shadowBlur=24;
        X.fillText(title,W/2,H*0.42);
        X.shadowBlur=0;X.font='14px monospace';X.fillStyle=mine?'#FFE24B':'#ccc';
        X.fillText(ev.name+(mine?' (YOU)':'')+' — '+fmt(ev.collateral_lost)+'g '+verb,W/2,H*0.42+34);
        X.restore();
        if(t<90)requestAnimationFrame(anim);else cv.remove();
    };
    anim();
}
function flashCrashOverlay(ev){
    SND.duelHit&&SND.duelHit();
    const cv=document.createElement('canvas');
    cv.width=window.innerWidth;cv.height=window.innerHeight;
    cv.style.cssText='position:fixed;left:0;top:0;z-index:10001;pointer-events:none';
    document.body.appendChild(cv);
    const X=cv.getContext('2d');const W=cv.width,H=cv.height;
    const bars=[];for(let i=0;i<40;i++)bars.push({x:Math.random()*W,y:-Math.random()*H,h:20+Math.random()*80,v:6+Math.random()*14});
    let t=0;
    const anim=()=>{
        t++;X.clearRect(0,0,W,H);
        X.fillStyle='rgba(120,0,0,'+(0.30*Math.max(0,1-t/70))+')';X.fillRect(0,0,W,H);
        X.strokeStyle='#FF3B3B';X.lineWidth=3;
        for(const b of bars){b.y+=b.v;X.beginPath();X.moveTo(b.x,b.y);X.lineTo(b.x-8,b.y-b.h);X.stroke();
            X.beginPath();X.moveTo(b.x,b.y);X.lineTo(b.x-14,b.y-8);X.moveTo(b.x,b.y);X.lineTo(b.x-4,b.y-16);X.stroke();
            if(b.y>H+b.h){b.y=-b.h;b.x=Math.random()*W;}}
        X.save();X.textAlign='center';const sc=Math.min(1,t/12);
        X.font='bold '+Math.round(44*sc)+'px monospace';X.fillStyle='#FF3B3B';X.shadowColor='#FF3B3B';X.shadowBlur=26;
        X.fillText('FLASH CRASH',W/2,H*0.42);
        X.shadowBlur=0;X.font='13px monospace';X.fillStyle='#FFE24B';
        X.fillText('GOLDEN-500 → '+fmt(Math.round(ev.index||0))+'  shorts feast, leveraged bleed',W/2,H*0.42+32);
        X.restore();
        if(t<100)requestAnimationFrame(anim);else cv.remove();
    };
    anim();
}

// ====== INTERACTIVE MOUSE TILT / ZOOM (CSS 3D on the canvas) ======
let TILT_ZOOM=1, TILT_RX=0, TILT_RY=0;
function applyCardTransform(){
    C.style.transform='rotateX('+TILT_RX.toFixed(2)+'deg) rotateY('+TILT_RY.toFixed(2)+'deg) scale('+TILT_ZOOM.toFixed(3)+')';
}
C.addEventListener('mousemove',e=>{
    const r=C.getBoundingClientRect();
    const px=(e.clientX-r.left)/r.width -0.5;   // -0.5..0.5
    const py=(e.clientY-r.top)/r.height -0.5;
    const max=9;   // max tilt degrees
    TILT_RX=-py*max; TILT_RY=px*max;
    C.classList.add('tilting');
    applyCardTransform();
});
C.addEventListener('mouseleave',()=>{
    TILT_RX=0; TILT_RY=0;
    C.classList.remove('tilting');
    applyCardTransform();
});
C.addEventListener('wheel',e=>{
    e.preventDefault();
    TILT_ZOOM=Math.max(0.7,Math.min(2.2,TILT_ZOOM - Math.sign(e.deltaY)*0.08));
    applyCardTransform();
},{passive:false});
// double-click to reset view
C.addEventListener('dblclick',()=>{if(WBOSS.active){WBOSS.active=false;return;}if(CHEST.active){CHEST.active=false;return;}TILT_ZOOM=1;TILT_RX=0;TILT_RY=0;C.classList.remove('tilting');applyCardTransform();});
