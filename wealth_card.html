<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>CORP HEIST — Wealth Card</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#080810;display:flex;flex-direction:column;align-items:center;font-family:'Courier New',monospace;color:#ccc;min-height:100vh;padding:16px}
canvas{border:1px solid #1a1a2e;border-radius:4px;max-width:100%}
.ctrls{margin:10px 0;display:flex;gap:6px;flex-wrap:wrap;justify-content:center}
.ctrls button{background:#1a1a2e;color:#FFC800;border:1px solid #333;padding:5px 12px;cursor:pointer;font-family:inherit;font-size:10px;border-radius:3px}
.ctrls button:hover{border-color:#FFC800}
.info{font-size:9px;color:#444;margin-top:6px}
</style>
</head>
<body>
<div class="ctrls">
<select id="player-select" onchange="loadPlayer(this.value)" style="background:#1a1a2e;color:#FFC800;border:1px solid #333;padding:5px 8px;font-family:inherit;font-size:10px;border-radius:3px">
<option value="local">LOCAL DEMO</option>
</select>
<button onclick="refreshPlayers()">REFRESH LIST</button>
<button onclick="newPortfolio()">NEW PLAYER</button>
<button onclick="dropLoot()">DROP LOOT</button>
<button onclick="tradeStock()">TRADE</button>
<button onclick="togglePause()">PAUSE</button>
<button onclick="exportPNG()">EXPORT PNG</button>
<button onclick="donateLoot()" style="border-color:#FF3232;color:#FF3232">DONATE</button>
<button onclick="buyGold()" style="border-color:#00AAFF;color:#00AAFF">BUY GOLD</button>
<button onclick="supportRequest()" style="border-color:#00FF8C;color:#00FF8C">SUPPORT</button>
<span id="refresh-timer" style="color:#555;font-size:9px;line-height:28px;margin-left:8px">refresh in 60:00</span>
</div>
<canvas id="c" width="800" height="500"></canvas>
<div class="info" id="info"></div>

<script>
// ============================================================
// CORP HEIST — INTEGRATED WEALTH CARD
// Portfolio (stocks + loot) -> Canvas rendering
// Loot rendered via 1200 math algorithms
// ============================================================

const C=document.getElementById('c');
const X=C.getContext('2d');
const W=C.width,H=C.height;
const PHI=1.618033988749,TAU=Math.PI*2;
const RCOL=['#888899','#00AAFF','#AA00FF','#FF3232','#FFC800','#FF00AA'];
const RGLOW=[0,2,5,8,12,18];
const RNAMES=['Common','Uncommon','Rare','Epic','Legendary','Unique'];
const SNAMES=['AAPL','GOOGL','MSFT','TSLA','NVDA','JPM','META','AMZN','V','MA','NFLX','CRM','PYPL','COIN','PLTR','SQ','ABNB','SPOT','RIVN','SNOW'];
const PNAMES=['WOLF','SHARK','EAGLE','COBRA','TIGER','PANTHER','DRAGON','VIPER','HAWK','PUMA'];
const CNAMES=['Apex Corp','Quantum Ltd','Nova Group','Atlas Inc','Zenith Co','Titan SA','Cipher AG','Pulse LLC','Vector plc','Helix Corp'];

let P,frame=0,paused=false;

// ====== RENDERERS (10 categories, ~1200 algorithms) ======
const R={};
R.watches=[];for(let i=0;i<150;i++)R.watches.push(drawWatch);
R.cars=[];for(let i=0;i<200;i++)R.cars.push(drawCar);
R.realestate=[];for(let i=0;i<200;i++)R.realestate.push(drawRealEstate);
R.yachts=[];for(let i=0;i<100;i++)R.yachts.push(drawYacht);
R.jewelry=[];for(let i=0;i<100;i++)R.jewelry.push(drawJewelry);
R.art=[];for(let i=0;i<100;i++)R.art.push(drawArt);
R.restaurants=[];for(let i=0;i<100;i++)R.restaurants.push(drawRestaurant);
R.fashion=[];for(let i=0;i<100;i++)R.fashion.push(drawFashion);
R.tech=[];for(let i=0;i<100;i++)R.tech.push(drawTech);
R.jets=[];for(let i=0;i<50;i++)R.jets.push(drawJet);

const CATS=Object.keys(R);
const TOTAL=CATS.reduce((s,c)=>s+R[c].length,0);

function getRenderer(code){
    const ci=code%CATS.length;
    const cat=CATS[ci];
    const ri=(Math.floor(code/CATS.length))%R[cat].length;
    return {cat,fn:R[cat][ri],idx:ri};
}

// ====== DRAW FUNCTIONS ======
function rr(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}

function gem(ctx,x,y,r,hue,rar){
    const s=3+(x*7)%3;
    ctx.beginPath();
    for(let i=0;i<s;i++){const a=i*TAU/s;if(i===0)ctx.moveTo(x+Math.cos(a)*r,y+Math.sin(a)*r);else ctx.lineTo(x+Math.cos(a)*r,y+Math.sin(a)*r);}
    ctx.closePath();
    const g=ctx.createLinearGradient(x-r,y-r,x+r,y+r);
    g.addColorStop(0,`hsl(${hue},90%,${55+rar*7}%)`);g.addColorStop(1,`hsl(${hue+20},85%,${45+rar*6}%)`);
    ctx.fillStyle=g;ctx.fill();ctx.strokeStyle=`hsl(${hue},100%,70%)`;ctx.lineWidth=0.5;ctx.stroke();
    ctx.beginPath();ctx.arc(x-r*0.3,y-r*0.3,r*0.25,0,TAU);ctx.fillStyle='rgba(255,255,255,0.3)';ctx.fill();
}

function drawWatch(ctx,cx,cy,s,code,rar){
    const h=(code*23+rar*60)%360,sty=code%6,band=Math.floor(code/6)%4;
    // glow
    if(rar>1){const g=ctx.createRadialGradient(cx,cy,s*0.15,cx,cy,s*0.7);g.addColorStop(0,`hsla(${h},80%,60%,${0.08+rar*0.03})`);g.addColorStop(1,'transparent');ctx.fillStyle=g;ctx.fillRect(cx-s,cy-s,s*2,s*2);}
    // band
    ctx.fillStyle=`hsl(${h},20%,${15+rar*4}%)`;
    if(band<2){rr(ctx,cx-s*0.11,cy-s*0.42,s*0.22,s*0.28,2);rr(ctx,cx-s*0.11,cy+s*0.14,s*0.22,s*0.28,2);}
    else{rr(ctx,cx-s*0.12,cy-s*0.42,s*0.24,s*0.28,3);rr(ctx,cx-s*0.12,cy+s*0.14,s*0.24,s*0.28,3);}
    // case
    const bh=(h+rar*30)%360;
    if(sty<3){ctx.beginPath();ctx.arc(cx,cy,s*0.24,0,TAU);ctx.fillStyle=`hsl(${bh},40%,${25+rar*7}%)`;ctx.fill();ctx.strokeStyle=`hsl(${bh},60%,${40+rar*9}%)`;ctx.lineWidth=1.5;ctx.stroke();}
    else{rr(ctx,cx-s*0.2,cy-s*0.2,s*0.4,s*0.4,sty===3?2:6);ctx.fillStyle=`hsl(${bh},40%,${25+rar*7}%)`;ctx.fill();ctx.strokeStyle=`hsl(${bh},60%,${40+rar*9}%)`;ctx.lineWidth=1.5;ctx.stroke();}
    // dial
    const dr=s*0.17;ctx.beginPath();ctx.arc(cx,cy,dr,0,TAU);ctx.fillStyle=`hsl(${(h+180)%360},12%,${8+rar*2}%)`;ctx.fill();
    for(let m=0;m<12;m++){const a=m*TAU/12-Math.PI/2;ctx.beginPath();ctx.moveTo(cx+Math.cos(a)*dr*0.7,cy+Math.sin(a)*dr*0.7);ctx.lineTo(cx+Math.cos(a)*dr*0.9,cy+Math.sin(a)*dr*0.9);ctx.strokeStyle=`hsl(${h},50%,55%)`;ctx.lineWidth=rar>=4?1.2:0.6;ctx.stroke();}
    const ha=(code%12)/12*TAU-Math.PI/2,ma=(code%60)/60*TAU-Math.PI/2;
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+Math.cos(ha)*dr*0.5,cy+Math.sin(ha)*dr*0.5);ctx.strokeStyle=`hsl(${h},70%,70%)`;ctx.lineWidth=1.5;ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+Math.cos(ma)*dr*0.7,cy+Math.sin(ma)*dr*0.7);ctx.strokeStyle=`hsl(${h},60%,60%)`;ctx.lineWidth=1;ctx.stroke();
    ctx.beginPath();ctx.arc(cx-dr*0.3,cy-dr*0.3,dr*0.12,0,TAU);ctx.fillStyle='rgba(255,255,255,0.15)';ctx.fill();
}

function drawCar(ctx,cx,cy,s,code,rar){
    const bs=code%5,h=(code*17+rar*45)%360,sc=s*0.004;
    if(rar>1){const g=ctx.createRadialGradient(cx,cy+4,2,cx,cy,s*0.6);g.addColorStop(0,`hsla(${h},80%,50%,0.15)`);g.addColorStop(1,'transparent');ctx.fillStyle=g;ctx.fillRect(cx-s,cy-s,s*2,s*2);}
    ctx.save();ctx.translate(cx,cy+4);ctx.scale(sc,sc);
    ctx.fillStyle='rgba(0,0,0,0.25)';ctx.beginPath();ctx.ellipse(0,35,85,7,0,0,TAU);ctx.fill();
    ctx.beginPath();
    const shapes=[[[-80,20],[-70,0],[-40,-15],[-20,-25],[0,-25],[30,-25],[50,-10],[80,0],[85,20]],[[-80,15],[-75,-5],[-50,-15],[-30,-30],[0,-30],[30,-30],[50,-15],[75,-5],[80,15]],[[-80,10],[-75,-20],[-55,-30],[50,-30],[75,-15],[80,10]],[[-75,15],[-65,-5],[-40,-20],[-10,-35],[20,-30],[55,-10],[80,5],[80,15]],[[-80,18],[-60,-5],[-30,-22],[10,-32],[50,-18],[80,0],[85,18]]];
    const sh=shapes[bs];
    sh.forEach((p,i)=>{if(i===0)ctx.moveTo(p[0],p[1]);else ctx.lineTo(p[0],p[1]);});ctx.closePath();
    const bg=ctx.createLinearGradient(-80,-30,80,30);bg.addColorStop(0,`hsl(${h},60%,${25+rar*7}%)`);bg.addColorStop(0.5,`hsl(${h},70%,${35+rar*9}%)`);bg.addColorStop(1,`hsl(${h},55%,${20+rar*5}%)`);ctx.fillStyle=bg;ctx.fill();ctx.strokeStyle=`hsl(${h},80%,${50+rar*7}%)`;ctx.lineWidth=1;ctx.stroke();
    ctx.fillStyle=`hsl(210,30%,${30+rar*4}%)`;ctx.fillRect(bs<2?-30:-25,-18,25,12);
    ctx.fillStyle=`hsl(50,100%,80%)`;ctx.beginPath();ctx.ellipse(78,4,3,2.5,0,0,TAU);ctx.fill();
    ctx.fillStyle=`hsl(0,100%,60%)`;ctx.beginPath();ctx.ellipse(-78,8,2.5,2,0,0,TAU);ctx.fill();
    [-55,55].forEach(wx=>{ctx.fillStyle='#111';ctx.beginPath();ctx.arc(wx,22,11,0,TAU);ctx.fill();ctx.fillStyle='#333';ctx.beginPath();ctx.arc(wx,22,7,0,TAU);ctx.fill();ctx.fillStyle=`hsl(${h},30%,40%)`;ctx.beginPath();ctx.arc(wx,22,3.5,0,TAU);ctx.fill();});
    ctx.beginPath();ctx.ellipse(-20,-15,22,2.5,-0.2,0,TAU);ctx.fillStyle='rgba(255,255,255,0.1)';ctx.fill();
    ctx.restore();
}

function drawRealEstate(ctx,cx,cy,s,code,rar){
    const tp=code%4,h=(code*31+rar*70)%360,sc=s*0.003,floors=3+Math.floor(code/4)%12;
    if(rar>1){const g=ctx.createRadialGradient(cx,cy,4,cx,cy,s*0.65);g.addColorStop(0,`hsla(${h},60%,50%,0.14)`);g.addColorStop(1,'transparent');ctx.fillStyle=g;ctx.fillRect(cx-s,cy-s,s*2,s*2);}
    ctx.save();ctx.translate(cx,cy+10);ctx.scale(sc,sc);
    const bw=45+tp*5;
    if(tp===0){
        const bh=floors*17;ctx.fillStyle=`hsl(${h},40%,${18+rar*5}%)`;ctx.fillRect(-bw/2,-bh,bw,bh);ctx.strokeStyle=`hsl(${h},60%,${35+rar*7}%)`;ctx.lineWidth=0.7;ctx.strokeRect(-bw/2,-bh,bw,bh);
        for(let f=0;f<floors;f++)for(let w=0;w<3;w++){ctx.fillStyle=((code+f*7+w*13)%5>1)?`hsl(50,80%,${70+rar*5}%)`:`hsl(${h},20%,10%)`;ctx.fillRect(-bw/2+4+w*13,-bh+f*17+3,9,11);}
        ctx.fillStyle=`hsl(${h},50%,${30+rar*5}%)`;ctx.beginPath();ctx.moveTo(-4,-bh);ctx.lineTo(0,-bh-22);ctx.lineTo(4,-bh);ctx.fill();
    }else if(tp===1){
        ctx.fillStyle=`hsl(${h},30%,${25+rar*5}%)`;ctx.fillRect(-48,-38,96,42);ctx.strokeStyle=`hsl(${h},40%,${35+rar*7}%)`;ctx.lineWidth=0.8;ctx.strokeRect(-48,-38,96,42);
        ctx.beginPath();ctx.moveTo(-55,-38);ctx.lineTo(0,-60);ctx.lineTo(55,-38);ctx.closePath();ctx.fillStyle=`hsl(${(h+20)%360},45%,${20+rar*4}%)`;ctx.fill();
        [-22,22].forEach(wx=>{ctx.fillStyle=`hsl(50,70%,${65+rar*5}%)`;ctx.fillRect(wx-7,-28,14,10);});
        ctx.fillStyle=`hsl(${(h+40)%360},40%,${18+rar*4}%)`;rr(ctx,-5,-10,10,14,1);ctx.fill();
    }else if(tp===2){
        ctx.fillStyle=`hsl(${h},35%,${22+rar*5}%)`;ctx.fillRect(-bw/2,-65,bw,69);ctx.beginPath();ctx.moveTo(-bw/2-4,-65);ctx.lineTo(0,-80);ctx.lineTo(bw/2+4,-65);ctx.closePath();ctx.fillStyle=`hsl(${(h+15)%360},40%,${18+rar*4}%)`;ctx.fill();
        for(let f=0;f<3;f++)for(let w=0;w<2;w++){ctx.fillStyle=`hsl(50,75%,${68+rar*5}%)`;ctx.fillRect(-bw/2+4+w*17,-60+f*19,11,9);}
        ctx.fillStyle=`hsl(${(h+30)%360},40%,${16+rar*4}%)`;rr(ctx,-5,-12,10,16,1);ctx.fill();
    }else{
        ctx.fillStyle=`hsl(${h},50%,${20+rar*5}%)`;rr(ctx,-48,-48,96,52,2);ctx.fill();ctx.strokeStyle=`hsl(${h},70%,${45+rar*7}%)`;ctx.lineWidth=1;ctx.strokeRect(-48,-48,96,52);
        for(let w=0;w<5;w++){ctx.fillStyle=((code+w*11)%3>0)?`hsl(50,80%,${72+rar*4}%)`:`hsl(${h},30%,12%)`;ctx.fillRect(-42+w*18,-43,12,42);}
        ctx.fillStyle=`hsl(${h},25%,${18+rar*4}%)`;ctx.fillRect(-48,4,96,5);
    }
    ctx.restore();
}

function drawYacht(ctx,cx,cy,s,code,rar){
    const h=(code*37+rar*50)%360,sc=s*0.004,len=55+code%5*12;
    if(rar>1){const g=ctx.createRadialGradient(cx,cy,4,cx,cy,s*0.65);g.addColorStop(0,`hsla(${h},70%,50%,0.12)`);g.addColorStop(1,'transparent');ctx.fillStyle=g;ctx.fillRect(cx-s,cy-s,s*2,s*2);}
    ctx.save();ctx.translate(cx,cy);ctx.scale(sc,sc);
    for(let w=0;w<3;w++){ctx.beginPath();ctx.moveTo(-len-15,14+w*5);for(let x=-len-15;x<=len+15;x+=3)ctx.lineTo(x,14+w*5+Math.sin(x*0.07+w*2)*2.5);ctx.strokeStyle=`hsl(210,60%,${25+w*9}%)`;ctx.lineWidth=0.8;ctx.stroke();}
    ctx.beginPath();ctx.moveTo(-len,4);ctx.quadraticCurveTo(-len-4,14,-len+8,16);ctx.lineTo(len-8,16);ctx.quadraticCurveTo(len+4,8,len,0);ctx.lineTo(-len,0);ctx.closePath();
    const hg=ctx.createLinearGradient(0,-8,0,16);hg.addColorStop(0,`hsl(${h},50%,${40+rar*7}%)`);hg.addColorStop(1,`hsl(${h},40%,${20+rar*4}%)`);ctx.fillStyle=hg;ctx.fill();ctx.strokeStyle=`hsl(${h},60%,${50+rar*7}%)`;ctx.lineWidth=0.7;ctx.stroke();
    ctx.fillStyle=`hsl(30,30%,${35+rar*5}%)`;ctx.fillRect(-len+12,-1,len-20,3);
    for(let c=0;c<Math.min(5,Math.floor(len/14));c++){ctx.fillStyle=`hsl(50,80%,${70+rar*5}%)`;ctx.beginPath();ctx.arc(-len+22+c*13,1,1.8,0,TAU);ctx.fill();}
    ctx.fillStyle=`hsl(${h},45%,${30+rar*5}%)`;ctx.fillRect(-14,-10,28,9);ctx.fillRect(-9,-17,18,7);
    ctx.strokeStyle=`hsl(${h},30%,${40+rar*5}%)`;ctx.lineWidth=1.3;ctx.beginPath();ctx.moveTo(0,-17);ctx.lineTo(0,-40);ctx.stroke();
    ctx.beginPath();ctx.moveTo(0,-38);ctx.quadraticCurveTo(13,-28,7,-16);ctx.lineTo(0,-16);ctx.closePath();ctx.fillStyle=`hsla(${(h+180)%360},40%,80%,0.5)`;ctx.fill();
    ctx.beginPath();ctx.ellipse(-18,-4,13,1.8,-0.1,0,TAU);ctx.fillStyle='rgba(255,255,255,0.1)';ctx.fill();
    ctx.restore();
}

function drawJewelry(ctx,cx,cy,s,code,rar){
    const tp=code%4,gh=(code*41+rar*60)%360,sc=s*0.004;
    if(rar>1){const g=ctx.createRadialGradient(cx,cy,2,cx,cy,s*0.55);g.addColorStop(0,`hsla(${gh},90%,60%,${0.18+rar*0.03})`);g.addColorStop(0.5,`hsla(${gh},80%,50%,0.05)`);g.addColorStop(1,'transparent');ctx.fillStyle=g;ctx.fillRect(cx-s,cy-s,s*2,s*2);}
    ctx.save();ctx.translate(cx,cy);ctx.scale(sc,sc);
    if(tp===0){ctx.beginPath();ctx.arc(0,0,17,0,TAU);ctx.strokeStyle=`hsl(50,70%,${50+rar*8}%)`;ctx.lineWidth=3.5;ctx.stroke();ctx.beginPath();ctx.arc(0,0,17,0,TAU);ctx.strokeStyle=`hsl(50,80%,${60+rar*7}%)`;ctx.lineWidth=1.5;ctx.stroke();gem(ctx,0,-18,7,gh,rar);}
    else if(tp===1){[-13,13].forEach(ex=>{ctx.strokeStyle=`hsl(50,70%,${50+rar*8}%)`;ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(ex,-14);ctx.lineTo(ex,4);ctx.stroke();ctx.beginPath();ctx.arc(ex,9,5,0,TAU);ctx.fillStyle=`hsl(${gh},70%,${30+rar*7}%)`;ctx.fill();ctx.strokeStyle=`hsl(${gh},80%,${50+rar*9}%)`;ctx.lineWidth=0.7;ctx.stroke();ctx.beginPath();ctx.arc(ex-1.5,7.5,1.5,0,TAU);ctx.fillStyle='rgba(255,255,255,0.2)';ctx.fill();});}
    else if(tp===2){for(let b=0;b<8;b++){const a=b*TAU/8,bx=Math.cos(a)*18,by=Math.sin(a)*11;ctx.fillStyle=`hsl(${(gh+b*15)%360},60%,${35+rar*7}%)`;ctx.beginPath();ctx.arc(bx,by,3.5,0,TAU);ctx.fill();}ctx.beginPath();ctx.ellipse(0,0,18,11,0,0,TAU);ctx.strokeStyle=`hsl(50,60%,${45+rar*7}%)`;ctx.lineWidth=1;ctx.stroke();}
    else{ctx.beginPath();ctx.arc(0,0,13,0,TAU);ctx.fillStyle=`hsl(50,60%,${40+rar*7}%)`;ctx.fill();ctx.strokeStyle=`hsl(50,75%,${55+rar*9}%)`;ctx.lineWidth=1.3;ctx.stroke();gem(ctx,0,0,5.5,gh,rar);ctx.beginPath();ctx.moveTo(0,-13);ctx.quadraticCurveTo(-2.5,-20,0,-26);ctx.quadraticCurveTo(2.5,-20,0,-13);ctx.strokeStyle=`hsl(50,60%,${50+rar*6}%)`;ctx.lineWidth=0.7;ctx.stroke();}
    ctx.restore();
}

function drawArt(ctx,cx,cy,s,code,rar){
    const sty=code%5,h=(code*29+rar*55)%360;
    if(rar>1){const g=ctx.createRadialGradient(cx,cy,4,cx,cy,s*0.55);g.addColorStop(0,`hsla(${h},70%,50%,0.16)`);g.addColorStop(1,'transparent');ctx.fillStyle=g;ctx.fillRect(cx-s,cy-s,s*2,s*2);}
    const fw=s*0.5,fh=s*0.37;
    ctx.fillStyle=`hsl(30,40%,${18+rar*4}%)`;ctx.fillRect(cx-fw-3,cy-fh-3,fw*2+6,fh*2+6);
    ctx.fillStyle=`hsl(30,50%,${25+rar*5}%)`;ctx.fillRect(cx-fw-1,cy-fh-1,fw*2+2,fh*2+2);
    ctx.fillStyle=`hsl(${h},15%,${90-rar*4}%)`;ctx.fillRect(cx-fw,cy-fh,fw*2,fh*2);
    if(sty===0){for(let n=0;n<4+code%3;n++){const nx=cx+Math.sin(n*code*0.3)*fw*0.6,ny=cy+Math.cos(n*code*0.7)*fh*0.5,nr=4+Math.abs(Math.sin(n*code*0.5))*12;ctx.beginPath();ctx.arc(nx,ny,nr,0,TAU);ctx.fillStyle=`hsla(${(h+n*40)%360},${50+rar*7}%,${40+n*8}%,0.55)`;ctx.fill();}}
    else if(sty===1){for(let y2=0;y2<fh*2;y2+=2.5){const f=y2/(fh*2);ctx.fillStyle=`hsl(${(h+f*120)%360},${50+rar*8}%,${30+f*35}%)`;ctx.fillRect(cx-fw,cy-fh+y2,fw*2,2.5);}}
    else if(sty===2){for(let n=0;n<7+code%4;n++){const lx=cx+Math.sin(n*1.5)*fw*0.7,ly=cy-fh+Math.abs(Math.sin(n*code*0.4))*fh*2;ctx.beginPath();ctx.moveTo(lx-fw*0.25,ly);ctx.lineTo(lx+fw*0.25,ly+fh*0.35);ctx.strokeStyle=`hsla(${(h+n*30)%360},60%,${40+n*5}%,0.65)`;ctx.lineWidth=1+rar*0.4;ctx.stroke();}}
    else if(sty===3){for(let n=0;n<18+code%8;n++){const dx=cx+Math.sin(n*code*0.2)*fw*0.75,dy=cy+Math.cos(n*code*0.3)*fh*0.65;ctx.beginPath();ctx.arc(dx,dy,1.5+code%2.5,0,TAU);ctx.fillStyle=`hsl(${(h+n*18)%360},70%,${50+n*1.5}%)`;ctx.fill();}}
    else{ctx.beginPath();for(let a=0;a<10;a+=0.05){const r2=a*2.8;if(r2>fw*0.75)break;const px=cx+Math.cos(a+code*0.1)*r2*0.5,py=cy+Math.sin(a+code*0.1)*r2*0.35;a===0?ctx.moveTo(px,py):ctx.lineTo(px,py);}ctx.strokeStyle=`hsl(${h},60%,${45+rar*7}%)`;ctx.lineWidth=1.3;ctx.stroke();}
}

function drawRestaurant(ctx,cx,cy,s,code,rar){

// ====== PORTFOLIO ======
function rollRarity(){const r=Math.random()*10000;if(r<10)return 5;if(r<50)return 4;if(r<300)return 3;if(r<1000)return 2;if(r<3000)return 1;return 0;}

function newPortfolio(){
    const ns=Math.floor(Math.random()*8)+2,nl=Math.floor(Math.random()*10)+3;
    const stocks=[];for(let i=0;i<ns;i++){stocks.push({name:SNAMES[Math.floor(Math.random()*SNAMES.length)],price:Math.random()*300+10,held:Math.floor(Math.random()*200)+1,delta:(Math.random()-0.5)*10,vol:Math.floor(Math.random()*10000)});}
    const loot=[];for(let i=0;i<nl;i++){const r=rollRarity();loot.push({code:Math.floor(Math.random()*65535),rarity:r,qty:Math.floor(Math.random()*5)+1,value:[10,50,250,1500,10000,50000][r]});}
    let nw=0;stocks.forEach(s=>{nw+=s.price*s.held});loot.forEach(l=>{nw+=l.value*l.qty});
    P={name:PNAMES[Math.floor(Math.random()*PNAMES.length)],corp:CNAMES[Math.floor(Math.random()*CNAMES.length)],level:Math.floor(Math.random()*50)+1,gold:Math.floor(Math.random()*500000),netWorth:nw,stocks,loot,
       history:genHist(nw),prestige:Math.floor(Math.random()*10),streak:Math.floor(Math.random()*90),rank:Math.floor(Math.random()*100)+1};
    frame=0;
}
function genHist(nw){const h=[];let v=nw*0.1;for(let i=0;i<150;i++){v+=v*0.02*(Math.random()-0.48);h.push(v);}return h;}
function dropLoot(){const r=rollRarity();const v=[10,50,250,1500,10000,50000][r];P.loot.push({code:Math.floor(Math.random()*65535),rarity:r,qty:1,value:v});P.netWorth+=v;P.gold+=v;if(P.history.length)P.history.push(P.history[P.history.length-1]+v*0.3);}
function tradeStock(){const s=P.stocks[Math.floor(Math.random()*P.stocks.length)];if(!s)return;const d=(Math.random()-0.5)*20;s.price=Math.max(1,s.price+d);s.delta=d;if(P.history.length)P.history.push(P.history[P.history.length-1]+d*s.held*0.1);}

// ====== RENDER ======
function fmt(n){if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1e3)return(n/1e3).toFixed(1)+'K';return ''+n;}

// --- Golden section helpers (phi = 1.618...) ---

// Golden rectangle subdivided into squares with quarter-circle arcs
function drawGoldenRect(x,y,w,h,depth,col,alpha){
    if(depth<=0||w<6||h<6)return;
    X.save();
    X.globalAlpha=alpha;
    X.strokeStyle=col;X.lineWidth=0.5;
    X.strokeRect(x,y,w,h);
    // square on the shorter side
    if(w>=h){
        const s=h;
        X.beginPath();X.arc(x+s,y+s,s,Math.PI,1.5*Math.PI);X.stroke(); // top-right arc
        drawGoldenRect(x+s,y,w-s,h,depth-1,col,alpha*0.85);
    }else{
        const s=w;
        X.beginPath();X.arc(x+s,y+s,s,1.5*Math.PI,2*Math.PI);X.stroke(); // bottom-right arc
        drawGoldenRect(x,y+s,w,h-s,depth-1,col,alpha*0.85);
    }
    X.restore();
}

// True logarithmic golden spiral: r = a * phi^(theta * 2/pi)
function drawGoldenSpiral(cx,cy,maxR,turns,t,col){
    const a=maxR/Math.pow(PHI,turns*2); // scale so it fits maxR
    X.save();
    X.globalAlpha=0.22;
    X.strokeStyle=col;X.lineWidth=1.2;
    X.beginPath();
    const steps=400;
    for(let i=0;i<=steps;i++){
        const th=(i/steps)*turns*TAU + t*0.15;
        const r=a*Math.pow(PHI, th/(TAU/2));
        if(r>maxR*1.6)break;
        const px=cx+r*Math.cos(th), py=cy+r*Math.sin(th);
        i===0?X.moveTo(px,py):X.lineTo(px,py);
    }
    X.stroke();
    X.restore();
}

// Background tinted with golden-section guide lines
function drawGoldenBg(t,tc){
    // golden ratio vertical guide at W/phi
    const gx=W/PHI, gy=H/PHI;
    X.save();
    X.globalAlpha=0.04;X.strokeStyle='#FFC800';X.lineWidth=0.5;
    X.beginPath();X.moveTo(gx,0);X.lineTo(gx,H);X.stroke();
    X.beginPath();X.moveTo(0,gy);X.lineTo(W,gy);X.stroke();
    X.restore();
    // faint golden rectangles in corners
    drawGoldenRect(8, 8, W*0.32, W*0.32/PHI, 5, tc, 0.05);
    drawGoldenRect(W-W*0.32-8, H-W*0.32/PHI-8, W*0.32, W*0.32/PHI, 5, tc, 0.05);
}

function render(){
    const t=frame*0.018;frame++;
    X.fillStyle='#0a0a12';X.fillRect(0,0,W,H);

    const nw=P.netWorth;const tier=Math.min(5,Math.floor(Math.log10(Math.max(1,nw))/1.5));
    const tc=RCOL[tier];

    // === GOLDEN SECTION BACKGROUND ===
    drawGoldenBg(t,tc);

    // === LEFT: true golden spiral ===
    drawGoldenSpiral(90, 250, Math.min(W,H)*0.38, 3.2, t, tc);

    // === CENTER: stocks as waves ===
    const sx=170,sy=50,sw=350,sh=200;
    X.strokeStyle='#1a1a2e';X.lineWidth=0.5;X.strokeRect(sx,sy,sw,sh);
    X.fillStyle='#555';X.font='8px monospace';X.textAlign='center';X.fillText('PORTFOLIO — '+P.stocks.length+' stocks',sx+sw/2,sy-4);

    P.stocks.forEach((st,idx)=>{
        const yB=sy+15+idx*(sh-20)/Math.max(1,P.stocks.length);
        const amp=2.5+Math.abs(st.delta)*1.5;const freq=8+st.held/25;
        const col=st.delta>=0?'#00FF8C':'#FF3232';
        X.beginPath();
        for(let i=0;i<=sw;i+=3){const f=i/sw;const w=Math.sin(f*freq+t+idx*0.7)*amp*(1-Math.abs(f-0.5)*2);i===0?X.moveTo(sx+i,yB+w):X.lineTo(sx+i,yB+w);}
        X.strokeStyle=col;X.globalAlpha=0.55;X.lineWidth=1.2;X.stroke();X.globalAlpha=1;
        X.fillStyle='#444';X.font='7px monospace';X.textAlign='left';X.fillText(st.name,sx+3,yB-3);
        X.fillStyle=col;X.textAlign='right';X.fillText('$'+st.price.toFixed(1),sx+sw-3,yB-3);
    });

    // === RIGHT: loot items rendered ===
    const lx=540,ly=50,lw=245,lh=200;
    X.strokeStyle='#1a1a2e';X.lineWidth=0.5;X.strokeRect(lx,ly,lw,lh);
    X.fillStyle='#555';X.font='8px monospace';X.textAlign='center';X.fillText('LOOT — '+P.loot.length+' items',lx+lw/2,ly-4);

    const maxShow=Math.min(P.loot.length,12);
    const cellW=48,cellH=48;
    const cols=Math.floor(lw/cellW);
    for(let i=0;i<maxShow;i++){
        const col2=i%cols,row=Math.floor(i/cols);
        const cx=lx+8+col2*cellW+cellW/2;
        const cy=ly+8+row*cellH+cellH/2;
        const l=P.loot[i];
        const rarityColor=RCOL[l.rarity];
        const isMaint=((l.code*7+13)%100)<5;

        // cell bg + glow border in one stroke
        X.fillStyle=isMaint?'#111':rarityColor+'08';
        X.fillRect(cx-cellW/2+2,cy-cellH/2+2,cellW-4,cellH-4);
        X.strokeStyle=isMaint?'#33333340':rarityColor+'60';X.lineWidth=0.5;
        X.strokeRect(cx-cellW/2+2,cy-cellW/2+2,cellW-4,cellH-4);

        if(isMaint){
            X.fillStyle='#333';X.font='8px monospace';X.textAlign='center';

        }else{

            X.beginPath();X.rect(cx-cellW/2+2,cy-cellH/2+2,cellW-4,cellH-4);X.clip();

    X.globalAlpha=0.25;X.beginPath();for(let i=0;i<100;i++){const a=i*0.15+t*0.4;const r=22*Math.pow(PHI,i/40-3);if(r>22)break;i===0?X.moveTo(60+r*Math.cos(a),by+40+r*Math.sin(a)):X.lineTo(60+r*Math.cos(a),by+40+r*Math.sin(a));}X.strokeStyle='#FFC800';X.lineWidth=1;X.stroke();X.globalAlpha=1;

    X.fillStyle='#FFC800';X.font='8px monospace';X.textAlign='left';X.fillText('NET WORTH',20,by+14);
    X.font='bold 18px monospace';X.fillText('$'+fmt(P.netWorth),20,by+36);
    X.fillStyle='#555';X.font='8px monospace';X.fillText('RANK #'+P.rank+' | '+P.corp,20,by+50);

    // gold
    X.fillStyle='#FFD700';X.font='8px monospace';X.fillText('GOLD',200,by+14);
    X.font='bold 14px monospace';X.fillText('$'+fmt(P.gold),200,by+34);

        X.strokeStyle=RCOL[l.rarity]+'60';X.lineWidth=0.5;
        X.beginPath();X.moveTo(lx2+35,chainY-3);X.lineTo(lx2+55,chainY-3);X.stroke();
        X.beginPath();X.moveTo(lx2+52,chainY-5);X.lineTo(lx2+55,chainY-3);X.lineTo(lx2+52,chainY-1);X.stroke();
        // intermediary
        const mid=cnames[(l.code)%cnames.length];
        X.fillStyle='#555';X.fillText(mid.substr(0,8),lx2+58,chainY);
        // arrow to gold
        X.strokeStyle='#FFC80040';X.beginPath();X.moveTo(lx2+58+30,chainY-3);X.lineTo(lx2+58+45,chainY-3);X.stroke();
        X.fillStyle='#FFC800';X.fillText('$'+fmt(l.value),lx2+58+48,chainY);
    }

    // footer + disclaimer
    X.fillStyle='#1a1a2e';X.fillRect(0,H-35,W,35);
    X.fillStyle='#333';X.font='5.5px monospace';X.textAlign='center';
    X.fillText('Loot icons are personal symbols of ownership. CORP HEIST makes no claims over displayed items.',W/2,H-26);
    X.fillText('Items may be temporarily unavailable for maintenance, cleaning, or recalibration.',W/2,H-18);
    X.fillText('All purchases are voluntary. Rates set by system. Money-back per 14-ФЗ (Advertising). Age 12+',W/2,H-10);
    X.fillStyle='#222';X.font='7px monospace';
    X.fillText('CORP HEIST | Binary Protocol v2 | '+TOTAL+' render algorithms | Player->Char->System',W/2,H-3);

    if(!paused)requestAnimationFrame(render);
}

function togglePause(){paused=!paused;if(paused)requestAnimationFrame(render);}
function exportPNG(){const a=document.createElement('a');a.download='corp-heist-wealth.png';a.href=C.toDataURL('image/png');a.click();}

// donate: system decides budget, everything obtainable for something (14-ФЗ compliant)
function donateLoot(){
    if(!P.loot.length)return;
    let ri=0;P.loot.forEach((l,i)=>{if(l.rarity>P.loot[ri].rarity)ri=i;});
    const l=P.loot[ri];
    // system budget: gold multiplier by rarity (system decides, rates published)
    const sysMult=[3,5,8,12,20,50][l.rarity];
    const goldBonus=l.value*l.qty*sysMult;
    P.gold+=goldBonus;P.netWorth+=goldBonus;
    P.loot.splice(ri,1);
    if(P.history.length)P.history.push(P.history[P.history.length-1]+goldBonus*0.5);
}

// buy gold: real money -> game gold (system decides rate, USD/RUB, 14-ФЗ + 39-ФЗ compliant)
function buyGold(){
    const rates=[
        {usd:0.99,rub:89,gold:500,label:'$0.99/89₽'},
        {usd:4.99,rub:449,gold:3000,label:'$4.99/449₽'},
        {usd:9.99,rub:899,gold:7500,label:'$9.99/899₽'},
        {usd:19.99,rub:1799,gold:18000,label:'$19.99/1799₽'},
        {usd:49.99,rub:4499,gold:50000,label:'$49.99/4499₽'},
    ];
    const pick=rates[Math.floor(Math.random()*rates.length)];
    P.gold+=pick.gold;P.netWorth+=pick.gold;
    if(P.history.length)P.history.push(P.history[P.history.length-1]+pick.gold*0.3);
}

}

// ====== API BRIDGE (protocol -> canvas) ======
const API=location.origin;

async function refreshPlayers(){
    try{
        const r=await fetch(API+'/api/chars');
        const list=await r.json();
        const sel=document.getElementById('player-select');
        sel.innerHTML='<option value="local">LOCAL DEMO</option>';
        list.forEach(c=>{
            const opt=document.createElement('option');
            opt.value=c.user_id;
            opt.textContent='#'+c.user_id+' LVL'+c.level+' $'+(c.netWorth>=1e6?(c.netWorth/1e6).toFixed(1)+'M':(c.netWorth/1e3).toFixed(0)+'K');
            sel.appendChild(opt);
        });
    }catch(e){}
}

async function loadPlayer(uid){
    if(uid==='local'){newPortfolio();return;}
    try{
        const r=await fetch(API+'/api/char/'+uid);
        const d=await r.json();
        if(d.error)return;
        P.name=PNAMES[d.user_id%PNAMES.length];
        P.corp=CNAMES[d.corp_id%CNAMES.length];
        P.level=d.level;P.gold=d.gold;P.netWorth=d.net_worth;
        P.stocks=d.stocks||[];P.loot=d.loot||[];
        P.history=d.history&&d.history.length?d.history:genHist(d.net_worth);
        P.prestige=d.prestige;P.streak=d.streak_days;
        P.rank=d.rank_percent;frame=0;
    }catch(e){}
}

// ====== INFO ======
document.getElementById('info').textContent=TOTAL+' math render algorithms | 10 categories | Pure Canvas, zero assets | Hourly refresh';

// hourly refresh
let refreshLeft=3600;
setInterval(()=>{
    refreshLeft--;
    if(refreshLeft<=0){location.reload();return;}
    const m=Math.floor(refreshLeft/60),s=refreshLeft%60;
    document.getElementById('refresh-timer').textContent='refresh in '+m+':'+(s<10?'0':'')+s;
},1000);

// try fetch player list on load
refreshPlayers();

// auto-load player from ?uid= in URL (used by /card/N links)
const _urlUid = new URLSearchParams(location.search).get('uid');
if(_urlUid){ loadPlayer(_urlUid); }
else { newPortfolio(); }

render();
