name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.12', '3.13']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run protocol tests (pytest)
      run: python -m pytest tests/ -v --tb=short

    - name: Run protocol tests (standalone, zero-dep)
      run: |
        python tests/test_protocol.py
        python tests/test_bridge.py

    - name: Verify game imports
      run: |
        python -c "import config; import heroes; import battle; import shop; import save_system; import ui; print('All modules OK')"

    - name: Compile server + economy + press
      run: |
        python -m py_compile server_consolidated.py golden_econ.py market_cube.py
        python -m py_compile press/pdfkit_phi.py press/ttf_reader.py press/phi_data.py press/phi_charts.py press/live_data.py press/magazine.py press/build_issues.py press/brochure.py

    - name: Golden economy self-test
      run: python golden_econ.py

    - name: Market cube self-test
      run: python market_cube.py

    - name: Check client JS (syntax)
      run: |
        node --check market_cube.js
        node --check tests/test_cube_parity.js

    - name: Cube parity (Python core == JS twin, bit-for-bit)
      run: |
        python tests/test_cube_parity.py
        node tests/test_cube_parity.js

    - name: Build PHI PRESS (synthetic) and validate PDFs
      env:
        PRESS_SYNTH: '1'
      run: |
        python build_issues.py
      working-directory: press

    - name: Validate generated PDFs
      run: python .github/validate_pdfs.py
