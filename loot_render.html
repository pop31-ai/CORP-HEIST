<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>CORP HEIST βÄî Loot Renderer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#080810;font-family:'Courier New',monospace;color:#ccc;padding:12px}
h1{color:#FFC800;font-size:13px;letter-spacing:3px;text-align:center;margin:8px 0}
.grid{display:grid;grid-template-columns:repeat(10,1fr);gap:6px;max-width:1060px;margin:0 auto}
.card{position:relative;width:100%;aspect-ratio:1;border:1px solid #1a1a2e;border-radius:3px;overflow:hidden;cursor:pointer}
.card canvas{width:100%;height:100%}
.label{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,0.7);padding:2px 4px;font-size:6px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.controls{text-align:center;margin:10px 0}
.controls button{background:#1a1a2e;color:#FFC800;border:1px solid #333;padding:5px 12px;cursor:pointer;font-family:inherit;font-size:10px;margin:0 4px;border-radius:3px}
.controls button:hover{border-color:#FFC800}
.info{text-align:center;font-size:9px;color:#444;margin-top:8px}
</style>
</head>
<body>
<h1>CORP HEIST βÄî LOOT RENDER ENGINE</h1>
<div class="controls">
<button onclick="renderAll()">RENDER ALL</button>
<button onclick="renderCategory('watches')">WATCHES</button>
<button onclick="renderCategory('cars')">CARS</button>
<button onclick="renderCategory('realestate')">REAL ESTATE</button>
<button onclick="renderCategory('yachts')">YACHTS</button>
<button onclick="renderCategory('jewelry')">JEWELRY</button>
<button onclick="renderCategory('art')">ART</button>
<button onclick="renderCategory('restaurants')">RESTAURANTS</button>
<button onclick="renderCategory('fashion')">FASHION</button>
<button onclick="renderCategory('tech')">TECH</button>
<button onclick="renderCategory('jets')">JETS</button>
</div>
<div class="grid" id="grid"></div>
<div class="info" id="info"></div>

<script>
// ============================================================
// CORP HEIST βÄî Loot Render Engine
// ~1000 ―É–Ϋ–Η–Κ–Α–Μ―¨–Ϋ―΄―Ö –Α–Μ–≥–Ψ―Ä–Η―²–Φ–Ψ–≤ –Ψ―²―Ä–Η―¹–Ψ–≤–Κ–Η
// –ö–Α–Ε–¥―΄–Ι –Ω―Ä–Β–¥–Φ–Β―² = –Φ–Α―²–Β–Φ–Α―²–Η―΅–Β―¹–Κ–Α―è –Ω―Ä–Ψ―Ä–Η―¹–Ψ–≤–Κ–Α –Ϋ–Α Canvas
// –ù–Η–Κ–Α–Κ–Η―Ö –Α―¹―¹–Β―²–Ψ–≤ βÄî ―²–Ψ–Μ―¨–Κ–Ψ primitives + –≥―Ä–Α–¥–Η–Β–Ϋ―²―΄ + ―¹–≤–Β―΅–Β–Ϋ–Η–Β
// ============================================================

const PHI = 1.618033988749;
const TAU = Math.PI * 2;
const RARITY_COLORS = ['#888899','#00AAFF','#AA00FF','#FF3232','#FFC800','#FF00AA'];
const RARITY_GLOW = [0, 2, 4, 6, 10, 15];
const RARITY_NAMES = ['Common','Uncommon','Rare','Epic','Legendary','Unique'];

// ====== –ö–ê–Δ–ï–™–û–†–‰–‰ –‰ –ê–¦–™–û–†–‰–Δ–€–Ϊ ======
// –ö–Α–Ε–¥–Α―è –Κ–Α―²–Β–≥–Ψ―Ä–Η―è ―¹–Ψ–¥–Β―Ä–Ε–Η―² –Φ–Α―¹―¹–Η–≤ ―³―É–Ϋ–Κ―Ü–Η–Ι –Ψ―²―Ä–Η―¹–Ψ–≤–Κ–Η
// –ö–Α–Ε–¥–Α―è ―³―É–Ϋ–Κ―Ü–Η―è: (ctx, cx, cy, size, seed, rarity) => void

const RENDERERS = {};

// --- –ß–ê–Γ–Ϊ (watch_0..watch_149) ---
RENDERERS.watches = [];
for(let i=0;i<150;i++){
    RENDERERS.watches.push(function(ctx,cx,cy,s,seed,rarity){
        const style = i % 6; // 6 ―¹―²–Η–Μ–Β–Ι –Κ–Ψ―Ä–Ω―É―¹–Α
        const band = Math.floor(i/6) % 4; // 4 ―²–Η–Ω–Α ―Ä–Β–Φ–Β―à–Κ–Α
        const accent = (seed*7+13)%5; // ―Ü–≤–Β―² –Α–Κ―Ü–Β–Ϋ―²–Α
        const hue = (i*23+rarity*60)%360;
        const glow = RARITY_GLOW[rarity];

        // ―¹–≤–Β―΅–Β–Ϋ–Η–Β
        if(glow>0){
            const grad=ctx.createRadialGradient(cx,cy,s*0.2,cx,cy,s*0.8);
            grad.addColorStop(0,`hsla(${hue},80%,60%,0.15)`);
            grad.addColorStop(1,'transparent');
            ctx.fillStyle=grad;ctx.fillRect(cx-s,cy-s,s*2,s*2);
        }

        // ―Ä–Β–Φ–Β―à–Ψ–Κ
        ctx.fillStyle=`hsl(${hue},20%,${15+rarity*5}%)`;
        if(band===0){
            // –Κ–Ψ–Ε–Α–Ϋ―΄–Ι
            roundRect(ctx,cx-s*0.12,cy-s*0.45,s*0.24,s*0.3,2);
            roundRect(ctx,cx-s*0.12,cy+s*0.15,s*0.24,s*0.3,2);
        }else if(band===1){
            // –Φ–Β―²–Α–Μ–Μ–Η―΅–Β―¹–Κ–Η–Ι
            for(let j=0;j<5;j++){
                ctx.fillStyle=`hsl(${hue},10%,${25+j*8}%)`;
                ctx.fillRect(cx-s*0.1,cy-s*0.4+j*s*0.06,s*0.2,s*0.05);
                ctx.fillRect(cx-s*0.1,cy+s*0.18+j*s*0.06,s*0.2,s*0.05);
            }
        }else if(band===2){
            // –Κ–Β―Ä–Α–Φ–Η―΅–Β―¹–Κ–Η–Ι
            ctx.fillStyle=`hsl(${hue},30%,20%)`;
            roundRect(ctx,cx-s*0.13,cy-s*0.45,s*0.26,s*0.3,4);
            roundRect(ctx,cx-s*0.13,cy+s*0.15,s*0.26,s*0.3,4);
        }else{
            // ―²–Η―²–Α–Ϋ–Ψ–≤―΄–Ι
            ctx.fillStyle=`hsl(${hue},5%,30%)`;
            roundRect(ctx,cx-s*0.11,cy-s*0.45,s*0.22,s*0.3,1);
            roundRect(ctx,cx-s*0.11,cy+s*0.15,s*0.22,s*0.3,1);
        }

        // –Κ–Ψ―Ä–Ω―É―¹
        const bodyHue = (hue+rarity*30)%360;
        if(style===0){
            // –Κ―Ä―É–≥–Μ―΄–Ι
            ctx.beginPath();ctx.arc(cx,cy,s*0.25,0,TAU);
            ctx.fillStyle=`hsl(${bodyHue},40%,${25+rarity*8}%)`;ctx.fill();
            ctx.strokeStyle=`hsl(${bodyHue},60%,${40+rarity*10}%)`;ctx.lineWidth=1.5;ctx.stroke();
        }else if(style===1){
            // –Κ–≤–Α–¥―Ä–Α―²–Ϋ―΄–Ι
            roundRect(ctx,cx-s*0.22,cy-s*0.22,s*0.44,s*0.44,4);
            ctx.fillStyle=`hsl(${bodyHue},35%,${22+rarity*8}%)`;ctx.fill();
            ctx.strokeStyle=`hsl(${bodyHue},55%,${38+rarity*10}%)`;ctx.lineWidth=1.5;ctx.stroke();
        }else if(style===2){
            // –Ψ–≤–Α–Μ―¨–Ϋ―΄–Ι
            ctx.beginPath();ctx.ellipse(cx,cy,s*0.28,s*0.22,0,0,TAU);
            ctx.fillStyle=`hsl(${bodyHue},45%,${24+rarity*8}%)`;ctx.fill();
            ctx.strokeStyle=`hsl(${bodyHue},65%,${42+rarity*10}%)`;ctx.lineWidth=1.5;ctx.stroke();
        }else if(style===3){
            // tonneau
            ctx.beginPath();
            ctx.moveTo(cx-s*0.2,cy-s*0.15);
            ctx.quadraticCurveTo(cx-s*0.25,cy,cx-s*0.2,cy+s*0.15);
            ctx.lineTo(cx+s*0.2,cy+s*0.15);
            ctx.quadraticCurveTo(cx+s*0.25,cy,cx+s*0.2,cy-s*0.15);
            ctx.closePath();
            ctx.fillStyle=`hsl(${bodyHue},40%,${23+rarity*8}%)`;ctx.fill();
            ctx.strokeStyle=`hsl(${bodyHue},60%,${40+rarity*10}%)`;ctx.lineWidth=1.5;ctx.stroke();
        }else if(style===4){
            // cushion
            ctx.beginPath();
            ctx.moveTo(cx-s*0.18,cy-s*0.18);
            ctx.quadraticCurveTo(cx,cy-s*0.24,cx+s*0.18,cy-s*0.18);
            ctx.quadraticCurveTo(cx+s*0.24,cy,cx+s*0.18,cy+s*0.18);
            ctx.quadraticCurveTo(cx,cy+s*0.24,cx-s*0.18,cy+s*0.18);
            ctx.quadraticCurveTo(cx-s*0.24,cy,cx-s*0.18,cy-s*0.18);
            ctx.fillStyle=`hsl(${bodyHue},50%,${26+rarity*8}%)`;ctx.fill();
            ctx.strokeStyle=`hsl(${bodyHue},70%,${44+rarity*10}%)`;ctx.lineWidth=1.5;ctx.stroke();
        }else{
            // asym
            ctx.beginPath();
            ctx.moveTo(cx-s*0.22,cy-s*0.1);
            ctx.quadraticCurveTo(cx,cy-s*0.26,cx+s*0.15,cy-s*0.18);
            ctx.lineTo(cx+s*0.22,cy+s*0.1);
            ctx.quadraticCurveTo(cx,cy+s*0.22,cx-s*0.22,cy+s*0.15);
            ctx.closePath();
            ctx.fillStyle=`hsl(${bodyHue},40%,${24+rarity*8}%)`;ctx.fill();
            ctx.strokeStyle=`hsl(${bodyHue},60%,${42+rarity*10}%)`;ctx.lineWidth=1.5;ctx.stroke();
        }

        // ―Ü–Η―³–Β―Ä–±–Μ–Α―²
        const faceR = s*0.18;
        ctx.beginPath();ctx.arc(cx,cy,faceR,0,TAU);
        ctx.fillStyle=`hsl(${(hue+180)%360},15%,${8+rarity*3}%)`;ctx.fill();

        // –Φ–Α―Ä–Κ–Β―Ä―΄ ―΅–Α―¹–Ψ–≤
        for(let m=0;m<12;m++){
            const a=m*TAU/12-Math.PI/2;
            const inner=faceR*0.7, outer=faceR*0.9;
            ctx.beginPath();
            ctx.moveTo(cx+Math.cos(a)*inner,cy+Math.sin(a)*inner);
            ctx.lineTo(cx+Math.cos(a)*outer,cy+Math.sin(a)*outer);
            ctx.strokeStyle=`hsl(${hue},50%,60%)`;ctx.lineWidth=rarity>=4?1.5:0.8;ctx.stroke();
        }

        // ―¹―²―Ä–Β–Μ–Κ–Η
        const hAngle=(seed%12)/12*TAU-Math.PI/2;
        const mAngle=(seed%60)/60*TAU-Math.PI/2;
        ctx.beginPath();ctx.moveTo(cx,cy);
        ctx.lineTo(cx+Math.cos(hAngle)*faceR*0.5,cy+Math.sin(hAngle)*faceR*0.5);
        ctx.strokeStyle=`hsl(${hue},70%,70%)`;ctx.lineWidth=1.5;ctx.stroke();
        ctx.beginPath();ctx.moveTo(cx,cy);
        ctx.lineTo(cx+Math.cos(mAngle)*faceR*0.7,cy+Math.sin(mAngle)*faceR*0.7);
        ctx.strokeStyle=`hsl(${hue},60%,60%)`;ctx.lineWidth=1;ctx.stroke();

        // –±–Μ–Η–Κ
        ctx.beginPath();ctx.arc(cx-faceR*0.3,cy-faceR*0.3,faceR*0.15,0,TAU);
        ctx.fillStyle='rgba(255,255,255,0.15)';ctx.fill();
    });
}

// --- –ê–£–Δ–û (car_0..car_199) ---
RENDERERS.cars = [];
for(let i=0;i<200;i++){
    RENDERERS.cars.push(function(ctx,cx,cy,s,seed,rarity){
        const bodyStyle = i%5;
        const colorHue=(i*17+rarity*45)%360;
        const glow=RARITY_GLOW[rarity];
        const scale=s*0.004;

        if(glow>0){
            const grad=ctx.createRadialGradient(cx,cy+4,2,cx,cy,s*0.6);
            grad.addColorStop(0,`hsla(${colorHue},80%,50%,0.2)`);
            grad.addColorStop(1,'transparent');
            ctx.fillStyle=grad;ctx.fillRect(cx-s,cy-s,s*2,s*2);
        }

        ctx.save();ctx.translate(cx,cy+4);ctx.scale(scale,scale);

        // ―²–Β–Ϋ―¨
        ctx.fillStyle='rgba(0,0,0,0.3)';
        ctx.beginPath();ctx.ellipse(0,35,90,8,0,0,TAU);ctx.fill();

        // –Κ―É–Ζ–Ψ–≤
        ctx.beginPath();
        if(bodyStyle===0){
            // ―¹–Ω–Ψ―Ä―²–Κ–Α―Ä
            ctx.moveTo(-80,20);ctx.lineTo(-70,0);ctx.lineTo(-40,-15);
            ctx.quadraticCurveTo(-20,-25,0,-25);ctx.quadraticCurveTo(30,-25,50,-10);
            ctx.lineTo(80,0);ctx.lineTo(85,20);ctx.closePath();
        }else if(bodyStyle===1){
            // ―¹–Β–¥–Α–Ϋ
            ctx.moveTo(-80,15);ctx.lineTo(-75,-5);ctx.lineTo(-50,-15);
            ctx.quadraticCurveTo(-30,-30,0,-30);ctx.quadraticCurveTo(30,-30,50,-15);
            ctx.lineTo(75,-5);ctx.lineTo(80,15);ctx.closePath();
        }else if(bodyStyle===2){
            // SUV
            ctx.moveTo(-80,10);ctx.lineTo(-75,-20);ctx.lineTo(-55,-30);
            ctx.lineTo(50,-30);ctx.lineTo(75,-15);ctx.lineTo(80,10);ctx.closePath();
        }else if(bodyStyle===3){
            // ―Ö―ç―²―΅
            ctx.moveTo(-75,15);ctx.lineTo(-65,-5);ctx.lineTo(-40,-20);
            ctx.quadraticCurveTo(-10,-35,20,-30);ctx.lineTo(55,-10);ctx.lineTo(80,5);
            ctx.lineTo(80,15);ctx.closePath();
        }else{
            // –Κ―É–Ω–Β
            ctx.moveTo(-80,18);ctx.lineTo(-60,-5);ctx.lineTo(-30,-22);
            ctx.quadraticCurveTo(10,-32,50,-18);ctx.lineTo(80,0);ctx.lineTo(85,18);ctx.closePath();
        }

        const bodyGrad=ctx.createLinearGradient(-80,-30,80,30);
        bodyGrad.addColorStop(0,`hsl(${colorHue},60%,${25+rarity*8}%)`);
        bodyGrad.addColorStop(0.5,`hsl(${colorHue},70%,${35+rarity*10}%)`);
        bodyGrad.addColorStop(1,`hsl(${colorHue},55%,${20+rarity*6}%)`);
        ctx.fillStyle=bodyGrad;ctx.fill();
        ctx.strokeStyle=`hsl(${colorHue},80%,${50+rarity*8}%)`;ctx.lineWidth=1;ctx.stroke();

        // –Μ–Ψ–±–Ψ–≤–Ψ–Β ―¹―²–Β–Κ–Μ–Ψ
        ctx.beginPath();
        if(bodyStyle===0){
            ctx.moveTo(-35,-15);ctx.lineTo(-20,-25);ctx.lineTo(10,-25);ctx.lineTo(20,-15);
        }else{
            ctx.moveTo(-40,-15);ctx.quadraticCurveTo(-25,-32,5,-30);ctx.lineTo(25,-15);
        }
        ctx.closePath();
        ctx.fillStyle=`hsl(210,30%,${30+rarity*5}%)`;ctx.fill();
        ctx.strokeStyle=`hsl(210,40%,50%)`;ctx.lineWidth=0.5;ctx.stroke();

        // ―³–Α―Ä―΄
        ctx.fillStyle=`hsl(50,100%,80%)`;
        ctx.beginPath();ctx.ellipse(75,5,4,3,0,0,TAU);ctx.fill();
        ctx.fillStyle=`hsl(0,100%,60%)`;
        ctx.beginPath();ctx.ellipse(-75,8,3,2,0,0,TAU);ctx.fill();

        // –Κ–Ψ–Μ―ë―¹–Α
        [-55,55].forEach(wx=>{
            ctx.fillStyle='#111';
            ctx.beginPath();ctx.arc(wx,22,12,0,TAU);ctx.fill();
            ctx.fillStyle='#333';
            ctx.beginPath();ctx.arc(wx,22,8,0,TAU);ctx.fill();
            ctx.fillStyle=`hsl(${colorHue},30%,40%)`;
            ctx.beginPath();ctx.arc(wx,22,4,0,TAU);ctx.fill();
            // ―¹–Ω–Η―Ü―΄
            for(let sp=0;sp<5;sp++){
                const a=sp*TAU/5;
                ctx.beginPath();ctx.moveTo(wx+Math.cos(a)*3,22+Math.sin(a)*3);
                ctx.lineTo(wx+Math.cos(a)*7,22+Math.sin(a)*7);
                ctx.strokeStyle='#555';ctx.lineWidth=0.8;ctx.stroke();
            }
        });

        // –±–Μ–Η–Κ
        ctx.beginPath();ctx.ellipse(-20,-15,25,3,-0.2,0,TAU);
        ctx.fillStyle='rgba(255,255,255,0.12)';ctx.fill();

        ctx.restore();
    });
}

// --- –ù–ï–î–£–‰–•–‰–€–û–Γ–Δ–§ (real_0..real_199) ---
RENDERERS.realestate = [];
for(let i=0;i<200;i++){
    RENDERERS.realestate.push(function(ctx,cx,cy,s,seed,rarity){
        const type=i%4;
        const hue=(i*31+rarity*70)%360;
        const glow=RARITY_GLOW[rarity];
        const floors=3+Math.floor(i/4)%12;
        const scale=s*0.0035;

        if(glow>0){
            const grad=ctx.createRadialGradient(cx,cy,4,cx,cy,s*0.7);
            grad.addColorStop(0,`hsla(${hue},60%,50%,0.18)`);
            grad.addColorStop(1,'transparent');
            ctx.fillStyle=grad;ctx.fillRect(cx-s,cy-s,s*2,s*2);
        }

        ctx.save();ctx.translate(cx,cy+10);ctx.scale(scale,scale);

        if(type===0){
            // –Ϋ–Β–±–Ψ―¹–Κ―Ä―ë–±
            const bw=50,bh=floors*18;
            ctx.fillStyle='rgba(0,0,0,0.3)';
            ctx.fillRect(-bw/2+4,-bh+4,bw,bh);
            const bGrad=ctx.createLinearGradient(-bw/2,0,bw/2,0);
            bGrad.addColorStop(0,`hsl(${hue},40%,${18+rarity*5}%)`);
            bGrad.addColorStop(0.5,`hsl(${hue},50%,${28+rarity*7}%)`);
            bGrad.addColorStop(1,`hsl(${hue},35%,${15+rarity*4}%)`);
            ctx.fillStyle=bGrad;
            ctx.fillRect(-bw/2,-bh,bw,bh);
            ctx.strokeStyle=`hsl(${hue},60%,${35+rarity*8}%)`;ctx.lineWidth=0.8;
            ctx.strokeRect(-bw/2,-bh,bw,bh);
            // –Ψ–Κ–Ϋ–Α
            for(let f=0;f<floors;f++){
                for(let w=0;w<4;w++){
                    const lit=((seed+f*7+w*13)%5>1);
                    ctx.fillStyle=lit?`hsl(50,80%,${70+rarity*5}%)`:`hsl(${hue},20%,${10+rarity*3}%)`;
                    ctx.fillRect(-bw/2+5+w*11,-bh+f*18+4,8,12);
                }
            }
            // ―à–Ω–Η–Μ―¨
            ctx.fillStyle=`hsl(${hue},50%,${30+rarity*6}%)`;
            ctx.beginPath();ctx.moveTo(-5,-bh);ctx.lineTo(0,-bh-25);ctx.lineTo(5,-bh);ctx.fill();
        }else if(type===1){
            // –≤–Η–Μ–Μ–Α
            ctx.fillStyle='rgba(0,0,0,0.3)';
            ctx.fillRect(-56,-46,112,50);
            // ―¹―²–Β–Ϋ―΄
            ctx.fillStyle=`hsl(${hue},30%,${25+rarity*6}%)`;
            ctx.fillRect(-50,-40,100,44);
            ctx.strokeStyle=`hsl(${hue},40%,${35+rarity*8}%)`;ctx.lineWidth=1;
            ctx.strokeRect(-50,-40,100,44);
            // –Κ―Ä―΄―à–Α
            ctx.beginPath();ctx.moveTo(-60,-40);ctx.lineTo(0,-65);ctx.lineTo(60,-40);ctx.closePath();
            ctx.fillStyle=`hsl(${(hue+20)%360},50%,${20+rarity*5}%)`;ctx.fill();
            // –Ψ–Κ–Ϋ–Α
            [-25,25].forEach(wx=>{
                ctx.fillStyle=`hsl(50,70%,${65+rarity*5}%)`;
                ctx.fillRect(wx-8,-30,16,12);
                ctx.strokeStyle=`hsl(${hue},30%,30%)`;ctx.lineWidth=0.5;
                ctx.strokeRect(wx-8,-30,16,12);
                ctx.beginPath();ctx.moveTo(wx,-30);ctx.lineTo(wx,-18);ctx.stroke();
                ctx.beginPath();ctx.moveTo(wx-8,-24);ctx.lineTo(wx+8,-24);ctx.stroke();
            });
            // –¥–≤–Β―Ä―¨
            ctx.fillStyle=`hsl(${(hue+40)%360},40%,${18+rarity*4}%)`;
            roundRect(ctx,-6,-10,12,14,2);ctx.fill();
            // –Κ–Ψ–Μ–Ψ–Ϋ–Ϋ―΄
            [-42,42].forEach(px=>{
                ctx.fillStyle=`hsl(${hue},20%,${30+rarity*6}%)`;
                ctx.fillRect(px-2,-40,4,44);
            });
        }else if(type===2){
            // ―²–Α―É–Ϋ―Ö–Α―É―¹
            const bw=35,bh=70;
            ctx.fillStyle='rgba(0,0,0,0.3)';ctx.fillRect(-bw/2+3,-bh+3,bw,bh);
            ctx.fillStyle=`hsl(${hue},35%,${22+rarity*5}%)`;
            ctx.fillRect(-bw/2,-bh,bw,bh);
            ctx.strokeStyle=`hsl(${hue},45%,${32+rarity*7}%)`;ctx.lineWidth=0.8;
            ctx.strokeRect(-bw/2,-bh,bw,bh);
            // –Κ―Ä―΄―à–Α
            ctx.beginPath();ctx.moveTo(-bw/2-5,-bh);ctx.lineTo(0,-bh-15);ctx.lineTo(bw/2+5,-bh);ctx.closePath();
            ctx.fillStyle=`hsl(${(hue+15)%360},40%,${18+rarity*4}%)`;ctx.fill();
            // 3 ―ç―²–Α–Ε–Α –Ψ–Κ–Ψ–Ϋ
            for(let f=0;f<3;f++){
                for(let w=0;w<2;w++){
                    ctx.fillStyle=`hsl(50,75%,${68+rarity*5}%)`;
                    ctx.fillRect(-bw/2+5+w*17,-bh+8+f*20,12,10);
                }
            }
            // –¥–≤–Β―Ä―¨
            ctx.fillStyle=`hsl(${(hue+30)%360},40%,${15+rarity*4}%)`;
            roundRect(ctx,-5,-15,10,18,1);ctx.fill();
        }else{
            // –Ω–Β–Ϋ―²―Ö–Α―É―¹
            ctx.fillStyle='rgba(0,0,0,0.3)';ctx.fillRect(-56,-56,112,60);
            // ―¹―²–Β–Κ–Μ–Ψ
            const glassGrad=ctx.createLinearGradient(-50,-50,50,0);

function drawGem(ctx,x,y,r,hue,rarity,seed){
    const sides=3+seed%4;
    const rot=seed*0.1;
    ctx.beginPath();
    for(let i=0;i<sides;i++){
        const a=i*TAU/sides+rot;
        const px=x+Math.cos(a)*r, py=y+Math.sin(a)*r;
        if(i===0)ctx.moveTo(px,py);else ctx.lineTo(px,py);
    }
    ctx.closePath();
    const gGrad=ctx.createLinearGradient(x-r,y-r,x+r,y+r);
    gGrad.addColorStop(0,`hsl(${hue},90%,${55+rarity*7}%)`);
    gGrad.addColorStop(0.5,`hsl(${hue},80%,${40+rarity*5}%)`);
    gGrad.addColorStop(1,`hsl(${hue+20},85%,${50+rarity*8}%)`);
    ctx.fillStyle=gGrad;ctx.fill();
    ctx.strokeStyle=`hsl(${hue},100%,${70+rarity*5}%)`;ctx.lineWidth=0.5;ctx.stroke();
    // –±–Μ–Η–Κ
    ctx.beginPath();ctx.arc(x-r*0.3,y-r*0.3,r*0.25,0,TAU);
    ctx.fillStyle='rgba(255,255,255,0.3)';ctx.fill();
}

                ctx.fillStyle=`hsl(${(hue+u*40)%360},50%,${30+u*10}%)`;
                ctx.fillRect(-6,-12+u*9,12,6);
            }
        }else if(type===2){
            // VR-–Ψ―΅–Κ–Η
            ctx.fillStyle=`hsl(${hue},35%,${20+rarity*5}%)`;
            roundRect(ctx,-20,-10,40,20,8);ctx.fill();
            ctx.fillStyle=`hsl(250,50%,${15+rarity*4}%)`;
            ctx.beginPath();ctx.ellipse(-8,0,7,6,0,0,TAU);ctx.fill();
            ctx.beginPath();ctx.ellipse(8,0,7,6,0,0,TAU);ctx.fill();
            // –Μ–Η–Ϋ–Ζ―΄
            ctx.beginPath();ctx.ellipse(-8,0,5,4,0,0,TAU);
            ctx.strokeStyle=`hsl(${hue},80%,${50+rarity*8}%)`;ctx.lineWidth=0.8;ctx.stroke();
            ctx.beginPath();ctx.ellipse(8,0,5,4,0,0,TAU);ctx.stroke();
        }else if(type===3){
            // ―Ä–Ψ–±–Ψ―²-–Α–Ϋ–¥―Ä–Ψ–Η–¥
            // –≥–Ψ–Μ–Ψ–≤–Α
            ctx.fillStyle=`hsl(${hue},40%,${22+rarity*6}%)`;
            roundRect(ctx,-10,-22,20,18,5);ctx.fill();
            // –≥–Μ–Α–Ζ–Α
            ctx.fillStyle=`hsl(180,80%,${60+rarity*6}%)`;
            ctx.beginPath();ctx.arc(-4,-15,2.5,0,TAU);ctx.fill();
            ctx.beginPath();ctx.arc(4,-15,2.5,0,TAU);ctx.fill();
            // ―²–Β–Μ–Ψ
            ctx.fillStyle=`hsl(${hue},35%,${20+rarity*5}%)`;
            roundRect(ctx,-12,-4,24,22,3);ctx.fill();
            // ―Ä–Β–Α–Κ―²–Ψ―Ä
            ctx.beginPath();ctx.arc(0,6,4,0,TAU);
            ctx.fillStyle=`hsl(180,90%,${50+rarity*8}%)`;ctx.fill();
            // –Α–Ϋ―²–Β–Ϋ–Ϋ–Α
            ctx.strokeStyle=`hsl(${hue},40%,${35+rarity*6}%)`;ctx.lineWidth=1;
            ctx.beginPath();ctx.moveTo(0,-22);ctx.lineTo(0,-28);ctx.stroke();
            ctx.beginPath();ctx.arc(0,-28,2,0,TAU);ctx.fillStyle=`hsl(0,80%,60%)`;ctx.fill();
        }else{
            // –Κ–≤–Α–¥―Ä–Ψ–Κ–Ψ–Ω―²–Β―Ä
            ctx.fillStyle=`hsl(${hue},30%,${22+rarity*5}%)`;
            roundRect(ctx,-8,-4,16,8,2);ctx.fill();
            // –Ω―Ä–Ψ–Ω–Β–Μ–Μ–Β―Ä―΄
            [[-16,-8],[16,-8],[-16,8],[16,8]].forEach(([px,py])=>{
                ctx.beginPath();ctx.ellipse(px,py,10,2,seed*0.1,0,TAU);
                ctx.fillStyle=`hsla(${hue},40%,50%,0.3)`;ctx.fill();
                ctx.fillStyle=`hsl(${hue},25%,${18+rarity*4}%)`;
                ctx.beginPath();ctx.arc(px,py,2,0,TAU);ctx.fill();
            });
            // –Κ–Α–Φ–Β―Ä–Α
            ctx.fillStyle=`hsl(180,70%,${45+rarity*7}%)`;
            ctx.beginPath();ctx.arc(0,8,2.5,0,TAU);ctx.fill();
        }

        ctx.restore();
    });
}

// --- –î–•–ï–Δ–Ϊ (jet_0..jet_49) ---
RENDERERS.jets = [];
for(let i=0;i<50;i++){
    RENDERERS.jets.push(function(ctx,cx,cy,s,seed,rarity){
        const hue=(i*43+rarity*55)%360;
        const glow=RARITY_GLOW[rarity];
        const scale=s*0.0035;

        if(glow>0){
            const grad=ctx.createRadialGradient(cx,cy,4,cx,cy,s*0.7);
            grad.addColorStop(0,`hsla(${hue},70%,55%,0.2)`);
            grad.addColorStop(1,'transparent');
            ctx.fillStyle=grad;ctx.fillRect(cx-s,cy-s,s*2,s*2);
        }

        ctx.save();ctx.translate(cx,cy);ctx.scale(scale,scale);

        // ―¹–Μ–Β–¥
        ctx.beginPath();ctx.moveTo(-60,5);ctx.lineTo(-40,3);
        ctx.strokeStyle=`hsla(210,50%,60%,0.2)`;ctx.lineWidth=2;ctx.stroke();

        // ―³―é–Ζ–Β–Μ―è–Ε
        ctx.beginPath();
        ctx.moveTo(-50,0);ctx.quadraticCurveTo(-30,-8,10,-6);ctx.lineTo(40,-3);
        ctx.lineTo(45,0);ctx.lineTo(40,3);ctx.lineTo(10,6);
        ctx.quadraticCurveTo(-30,8,-50,0);ctx.closePath();
        const fGrad=ctx.createLinearGradient(0,-10,0,10);
        fGrad.addColorStop(0,`hsl(${hue},50%,${40+rarity*8}%)`);
        fGrad.addColorStop(1,`hsl(${hue},40%,${25+rarity*5}%)`);
        ctx.fillStyle=fGrad;ctx.fill();
        ctx.strokeStyle=`hsl(${hue},60%,${50+rarity*8}%)`;ctx.lineWidth=0.8;ctx.stroke();

        // –Κ―Ä―΄–Μ―¨―è
        ctx.beginPath();
        ctx.moveTo(-5,0);ctx.lineTo(-15,-25);ctx.lineTo(10,-20);ctx.lineTo(15,0);
        ctx.closePath();
        ctx.fillStyle=`hsl(${hue},45%,${30+rarity*6}%)`;ctx.fill();
        ctx.beginPath();
        ctx.moveTo(-5,0);ctx.lineTo(-15,25);ctx.lineTo(10,20);ctx.lineTo(15,0);
        ctx.closePath();ctx.fill();

        // –Κ–Η–Μ―¨
        ctx.beginPath();ctx.moveTo(35,0);ctx.lineTo(42,-12);ctx.lineTo(48,0);
        ctx.fillStyle=`hsl(${hue},40%,${28+rarity*5}%)`;ctx.fill();

        // –Η–Μ–Μ―é–Φ–Η–Ϋ–Α―²–Ψ―Ä―΄
        for(let w=0;w<4;w++){
            ctx.fillStyle=`hsl(50,80%,${70+rarity*5}%)`;
            ctx.beginPath();ctx.arc(-20+w*12,-4,1.5,0,TAU);ctx.fill();
        }

        // –±–Μ–Η–Κ
        ctx.beginPath();ctx.ellipse(-10,-5,20,1.5,-0.05,0,TAU);
        ctx.fillStyle='rgba(255,255,255,0.15)';ctx.fill();

        ctx.restore();
    });
}


// ====== –Θ–Δ–‰–¦–‰–Δ–Ϊ ======

function roundRect(ctx,x,y,w,h,r){
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
    ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
    ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);
    ctx.closePath();
}

// ====== –€–ê–ü–ü–‰–ù–™: loot_code -> –Κ–Α―²–Β–≥–Ψ―Ä–Η―è + –Η–Ϋ–¥–Β–Κ―¹ ======
function getLootRenderer(code,rarity){
    const cats=Object.keys(RENDERERS);
    const catIdx=code%cats.length;
    const cat=cats[catIdx];
    const renderers=RENDERERS[cat];
    const idx=(Math.floor(code/cats.length))%renderers.length;
    return {cat,idx,renderer:renderers[idx],name:cat+'_'+idx};
}

// ====== –†–ï–ù–î–ï–† ======
function renderCard(canvas,code,rarity,label){
    const ctx=canvas.getContext('2d');
    const w=canvas.width,h=canvas.height;
    const cx=w/2,cy=h/2-8;
    const s=Math.min(w,h)*0.45;

    // BG
    ctx.fillStyle='#0a0a12';ctx.fillRect(0,0,w,h);

    // vignette
    const vg=ctx.createRadialGradient(cx,cy,s*0.3,cx,cy,s);
    vg.addColorStop(0,'transparent');vg.addColorStop(1,'rgba(0,0,0,0.4)');
    ctx.fillStyle=vg;ctx.fillRect(0,0,w,h);

    // maintenance check (~5%)
    const isMaint=((code*7+13)%100)<5;

    if(isMaint){
        // under maintenance
        ctx.strokeStyle='#555';ctx.lineWidth=1.5;
        ctx.beginPath();ctx.arc(cx,cy-4,s*0.3,0,TAU);ctx.stroke();
        ctx.fillStyle='#444';ctx.font='8px monospace';ctx.textAlign='center';
        ctx.fillText('MAINTENANCE',cx,cy+8);
        ctx.fillStyle='#333';ctx.font='6px monospace';
        ctx.fillText('washing...',cx,cy+18);
    }else{
        const {renderer}=getLootRenderer(code,rarity);
        renderer(ctx,cx,cy,s,code,rarity);
    }

    // label
    ctx.fillStyle='rgba(0,0,0,0.6)';
    ctx.fillRect(0,h-16,w,16);
    ctx.fillStyle=isMaint?'#555':RARITY_COLORS[rarity];
    ctx.font='7px "Courier New",monospace';
    ctx.textAlign='center';
    ctx.fillText(isMaint?'[MAINT]':((label||getLootRenderer(code,rarity).name)+' ['+RARITY_NAMES[rarity]+']'),cx,h-5);

    // disclaimer
    ctx.fillStyle='#222';ctx.font='5px monospace';ctx.textAlign='center';
    ctx.fillText('symbol of ownership only',cx,h-1);
}

function renderAll(){
    const grid=document.getElementById('grid');
    grid.innerHTML='';
    const codes=[];
    // –Ω–Ψ 10 –Η–Ζ –Κ–Α–Ε–¥–Ψ–Ι –Κ–Α―²–Β–≥–Ψ―Ä–Η–Η
    const cats=Object.keys(RENDERERS);
    cats.forEach(cat=>{
        const len=RENDERERS[cat].length;
        for(let i=0;i<10;i++){
            codes.push({code:Math.floor(Math.random()*65535),rarity:Math.floor(Math.random()*6),name:cat+'_'+Math.floor(Math.random()*len)});
        }
    });
    codes.forEach(({code,rarity,name})=>{
        const div=document.createElement('div');div.className='card';
        const cv=document.createElement('canvas');cv.width=100;cv.height=100;
        div.appendChild(cv);
        const lb=document.createElement('div');lb.className='label';
        lb.textContent=name;lb.style.color=RARITY_COLORS[rarity];
        div.appendChild(lb);
        grid.appendChild(div);
        renderCard(cv,code,rarity,name);
    });
    document.getElementById('info').textContent=codes.length+' items rendered | '+Object.keys(RENDERERS).length+' categories | '+cats.map(c=>c+':'+RENDERERS[c].length).join(' | ');
}

function renderCategory(cat){
    const grid=document.getElementById('grid');
    grid.innerHTML='';
    const renderers=RENDERERS[cat];
    if(!renderers)return;
    const count=Math.min(renderers.length,40);
    const step=Math.max(1,Math.floor(renderers.length/count));
    for(let i=0;i<count;i++){
        const idx=i*step;
        const code=idx*Object.keys(RENDERERS).length+Object.keys(RENDERERS).indexOf(cat);
        const rarity=Math.min(5,Math.floor(idx/20));
        const div=document.createElement('div');div.className='card';
        const cv=document.createElement('canvas');cv.width=100;cv.height=100;
        div.appendChild(cv);
        const lb=document.createElement('div');lb.className='label';
        lb.textContent=cat+'_'+idx;lb.style.color=RARITY_COLORS[rarity];
        div.appendChild(lb);
        grid.appendChild(div);
        renderCard(cv,code,rarity,cat+'_'+idx);
    }
    document.getElementById('info').textContent=count+' items from '+cat+' | '+renderers.length+' total in category';
}

// START
renderAll();
